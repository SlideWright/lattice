<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Sample video still">
  <defs>
    <radialGradient id="vp-glow" cx="0.62" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#2f4a72"/>
      <stop offset="0.45" stop-color="#1a2c47"/>
      <stop offset="1" stop-color="#0c1420"/>
    </radialGradient>
    <linearGradient id="vp-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1420" stop-opacity="0"/>
      <stop offset="1" stop-color="#060a12"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#vp-glow)"/>
  <!-- soft light streak -->
  <path d="M-40 250 C 180 200, 360 240, 700 150" fill="none" stroke="#7ea6df" stroke-opacity="0.18" stroke-width="1.5"/>
  <path d="M-40 300 C 200 250, 420 290, 700 210" fill="none" stroke="#7ea6df" stroke-opacity="0.12" stroke-width="1.5"/>
  <!-- horizon light -->
  <ellipse cx="400" cy="120" rx="240" ry="90" fill="#3a5a8c" fill-opacity="0.22"/>
  <rect width="640" height="360" fill="url(#vp-floor)"/>
</svg>
