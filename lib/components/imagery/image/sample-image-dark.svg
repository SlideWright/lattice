<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <radialGradient id="nebula" cx="65%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1A2744" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#0D1117" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="70%" cy="35%" r="20%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Very dark background — simulates night photography or dark-themed asset -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#nebula)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>
  <!-- Star field -->
  <g fill="white">
    <circle cx="120" cy="80" r="1" opacity="0.6"/>
    <circle cx="340" cy="45" r="1.2" opacity="0.8"/>
    <circle cx="520" cy="130" r="0.8" opacity="0.5"/>
    <circle cx="680" cy="60" r="1" opacity="0.7"/>
    <circle cx="850" cy="100" r="1.4" opacity="0.9"/>
    <circle cx="1000" cy="40" r="0.8" opacity="0.6"/>
    <circle cx="1150" cy="90" r="1.1" opacity="0.7"/>
    <circle cx="200" cy="180" r="0.9" opacity="0.5"/>
    <circle cx="460" cy="220" r="1" opacity="0.6"/>
    <circle cx="750" cy="170" r="0.8" opacity="0.5"/>
    <circle cx="950" cy="190" r="1.2" opacity="0.7"/>
    <circle cx="1100" cy="150" r="0.9" opacity="0.6"/>
    <circle cx="80" cy="300" r="1" opacity="0.4"/>
    <circle cx="310" cy="350" r="0.8" opacity="0.5"/>
    <circle cx="580" cy="290" r="1.1" opacity="0.6"/>
    <circle cx="820" cy="320" r="0.9" opacity="0.5"/>
    <circle cx="1050" cy="280" r="1" opacity="0.7"/>
    <circle cx="1200" cy="340" r="0.8" opacity="0.4"/>
    <circle cx="150" cy="480" r="0.9" opacity="0.4"/>
    <circle cx="420" cy="510" r="1" opacity="0.5"/>
    <circle cx="700" cy="460" r="0.8" opacity="0.4"/>
    <circle cx="900" cy="500" r="1.2" opacity="0.6"/>
    <circle cx="1180" cy="470" r="0.9" opacity="0.5"/>
    <circle cx="260" cy="600" r="1" opacity="0.4"/>
    <circle cx="550" cy="640" r="0.8" opacity="0.3"/>
    <circle cx="780" cy="610" r="1.1" opacity="0.5"/>
    <circle cx="1020" cy="650" r="0.9" opacity="0.4"/>
  </g>
  <!-- Subtle network lines in the dark -->
  <g stroke="#1E3A5F" stroke-width="0.5" opacity="0.4">
    <line x1="850" y1="100" x2="680" y2="60"/>
    <line x1="850" y1="100" x2="1000" y2="40"/>
    <line x1="850" y1="100" x2="950" y2="190"/>
    <line x1="680" y1="60" x2="520" y2="130"/>
    <line x1="950" y1="190" x2="750" y2="170"/>
  </g>
  <!-- Central glow point -->
  <circle cx="850" cy="100" r="3" fill="white" opacity="0.9"/>
  <circle cx="850" cy="100" r="8" fill="white" opacity="0.15"/>
  <circle cx="850" cy="100" r="20" fill="white" opacity="0.05"/>
  <!-- Watermark -->
  <text x="640" y="690" font-family="system-ui,sans-serif" font-size="11" fill="#2A3A50" text-anchor="middle" letter-spacing="0.2em">SAMPLE · DARK IMAGE · image-dark MODIFIER DEMO</text>
</svg>
