<svg xmlns="http://www.w3.org/2000/svg" width="640" height="720" viewBox="0 0 640 720">
  <!-- Lattice-inspired sample image: a signal pipeline rendered on the
       same rhombic lattice the placeholder uses. Brand palette:
       deep navy canvas, brand-blue lattice, gold signal nodes. -->
  <defs>
    <pattern id="lattice" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 32L32 0L64 32L32 64Z" fill="none" stroke="#4A8FBF" stroke-width="1" opacity="0.35"/>
      <circle cx="32" cy="32" r="1.4" fill="#C9A24A" opacity="0.55"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A24A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C9A24A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas + lattice -->
  <rect width="640" height="720" fill="#003D66"/>
  <rect width="640" height="720" fill="url(#lattice)"/>

  <!-- Pipeline path: input → classify → score → decide -->
  <g stroke="#C9A24A" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M120 200 L260 280 L380 240 L520 360" stroke-linecap="round"/>
    <path d="M260 280 L240 440 L420 520" stroke-linecap="round" opacity="0.55"/>
    <path d="M380 240 L500 540" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Input -->
    <circle cx="120" cy="200" r="44" fill="url(#glow)"/>
    <circle cx="120" cy="200" r="14" fill="#C9A24A"/>
    <!-- Classify -->
    <circle cx="260" cy="280" r="36" fill="url(#glow)" opacity="0.9"/>
    <circle cx="260" cy="280" r="11" fill="#FFFFFF"/>
    <!-- Score -->
    <circle cx="380" cy="240" r="36" fill="url(#glow)" opacity="0.9"/>
    <circle cx="380" cy="240" r="11" fill="#FFFFFF"/>
    <!-- Decide -->
    <circle cx="520" cy="360" r="48" fill="url(#glow)"/>
    <circle cx="520" cy="360" r="16" fill="#C9A24A"/>
    <!-- Secondary nodes -->
    <circle cx="240" cy="440" r="9" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="420" cy="520" r="9" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="500" cy="540" r="7" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Subtle scanlines for depth -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="380" x2="640" y2="380"/>
    <line x1="0" y1="580" x2="640" y2="580"/>
  </g>
</svg>
