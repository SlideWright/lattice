<!--mode:dark-->
<div class="shell">
  <nav class="rail">
    <div class="rail-brand">L</div>
    <button class="rail-item"><svg class="icon"><use href="#i-compose"/></svg><span class="lbl">Compose</span></button>
    <button class="rail-item active"><svg class="icon"><use href="#i-present"/></svg><span class="lbl">Present</span></button>
    <button class="rail-item"><svg class="icon"><use href="#i-fabricate"/></svg><span class="lbl">Build</span></button>
    <button class="rail-item"><svg class="icon"><use href="#i-library"/></svg><span class="lbl">Decks</span></button>
    <div class="rail-spacer"></div>
    <button class="rail-item"><svg class="icon"><use href="#i-settings"/></svg><span class="lbl">Setup</span></button>
  </nav>

  <div class="col">
    <header class="appbar">
      <button class="deck-switch">
        <span class="dot"></span>
        <span class="name">Q3 Board Review</span>
        <span class="meta">read-aloud</span>
      </button>
      <div class="appbar-center">
        <div class="seg">
          <button class="on"><svg class="icon xs"><use href="#i-monitor"/></svg>Present</button>
          <button><svg class="icon xs"><use href="#i-volume"/></svg>Rehearse</button>
        </div>
      </div>
      <div class="appbar-spacer"></div>
      <div class="appbar-right">
        <button class="btn ghost"><svg class="icon sm"><use href="#i-monitor"/></svg>Presenter screen</button>
        <button class="btn primary"><svg class="icon sm"><use href="#i-share"/></svg>Share</button>
      </div>
    </header>

    <div class="work no-inspector">
      <div class="present">
        <!-- reader-chosen lens switch -->
        <div class="present-top">
          <div class="lens-switch">
            <button class="on"><svg class="icon xs"><use href="#i-file"/></svg>Full deck</button>
            <button><svg class="icon xs"><use href="#i-sparkles"/></svg>Exec summary</button>
            <button><svg class="icon xs"><use href="#i-grid"/></svg>One-pager</button>
          </div>
        </div>

        <div class="stage">
          <div class="spectrum"></div>
          <div class="stage-body">
            <div class="eyebrow">How the funnel converts</div>
            <h1>Growth held because <span class="read">retention did the heavy lifting.</span></h1>
            <p><span class="read spoken">Net revenue reached four point two million</span> this quarter, but the story underneath is retention: churn fell to one point four percent while new logos climbed.</p>
          </div>
        </div>

        <!-- read-aloud dock with synchronized highlight -->
        <div class="reader-dock">
          <div class="play"><svg class="icon"><use href="#i-pause"/></svg></div>
          <div class="scrubwrap">
            <div class="scrub"></div>
          </div>
          <span class="t">0:21 / 0:54</span>
          <div class="lens-switch" style="background:var(--bg-alt)">
            <button class="on"><svg class="icon xs"><use href="#i-volume"/></svg>Aria</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
