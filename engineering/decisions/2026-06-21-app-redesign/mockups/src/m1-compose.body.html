<!--mode:light;w:390-->
<div class="m-shell">
  <header class="m-appbar">
    <button class="m-ham"><svg class="icon sm"><use href="#i-library"/></svg></button>
    <span class="name">Q3 Board Review</span>
    <span class="appbar-spacer" style="flex:1"></span>
    <button class="iconbtn"><svg class="icon sm"><use href="#i-palette"/></svg></button>
    <button class="iconbtn primary"><svg class="icon sm"><use href="#i-share"/></svg></button>
  </header>

  <div class="m-tabs">
    <button><svg class="icon xs"><use href="#i-sparkles"/></svg></button>
    <button>Edit</button>
    <button class="on">Preview</button>
  </div>

  <div class="m-main">
    <div class="m-filmstrip">
      <div class="slide m-slide-full">
        <div class="spectrum"></div>
        <div class="slide-body" style="padding:18px 20px">
          <div class="eyebrow">The quarter in four numbers</div>
          <div class="cards">
            <div class="mini"><div class="k">$4.2M</div><div class="l">Net revenue</div></div>
            <div class="mini"><div class="k">+18%</div><div class="l">YoY growth</div></div>
            <div class="mini"><div class="k">142</div><div class="l">New logos</div></div>
            <div class="mini"><div class="k">1.4%</div><div class="l">Net churn</div></div>
          </div>
        </div>
        <div class="pg">2</div>
      </div>
    </div>
    <div class="m-status">
      <span class="ok"><svg class="icon xs"><use href="#i-check"/></svg>Rendered</span><span class="grow"></span><span>2 / 14</span>
    </div>
  </div>
</div>

<!-- v1: the activity rail becomes a slide-in intent drawer on mobile -->
<div class="m-scrim"></div>
<aside class="m-drawer">
  <a class="brand2 dhead"><span class="logo">L</span><span class="wm">Lattice</span></a>
  <div class="m-drawer-item on"><svg class="icon sm"><use href="#i-compose"/></svg>Compose</div>
  <div class="m-drawer-item"><svg class="icon sm"><use href="#i-present"/></svg>Present</div>
  <div class="m-drawer-item"><svg class="icon sm"><use href="#i-fabricate"/></svg>Fabricate</div>
  <div class="m-drawer-item"><svg class="icon sm"><use href="#i-library"/></svg>Decks</div>
  <div class="m-drawer-sep"></div>
  <div class="m-drawer-item"><svg class="icon sm"><use href="#i-settings"/></svg>Workspace</div>
</aside>
