<!--mode:light;w:820-->
<div class="tbadge">Tablet · portrait 820</div>
<div class="sframe">
  <header class="topbar">
    <a class="brand2"><span class="logo">L</span><span class="wm">Lattice</span></a>
    <nav class="itabs">
      <button class="itab on"><svg class="icon sm"><use href="#i-compose"/></svg>Compose</button>
      <button class="itab"><svg class="icon sm"><use href="#i-present"/></svg>Present</button>
      <button class="itab"><svg class="icon sm"><use href="#i-fabricate"/></svg>Fabricate</button>
    </nav>
    <div class="spacer"></div>
    <button class="btn icon-only ghost"><svg class="icon"><use href="#i-palette"/></svg></button>
    <button class="btn primary"><svg class="icon sm"><use href="#i-share"/></svg>Share</button>
    <button class="btn icon-only ghost"><svg class="icon"><use href="#i-settings"/></svg></button>
    <div class="avatar">SA</div>
  </header>

  <div class="ctxbar">
    <button class="deck-switch"><span class="dot"></span><span class="name">Q3 Board Review</span><span class="meta">14</span></button>
    <div class="seg">
      <button><svg class="icon xs"><use href="#i-type"/></svg>Edit</button>
      <button class="on"><svg class="icon xs"><use href="#i-eye"/></svg>Preview</button>
    </div>
    <div class="grow"></div>
    <button class="t-toggle"><svg class="icon sm"><use href="#i-sparkles"/></svg>Architect</button>
    <button class="t-toggle"><svg class="icon sm"><use href="#i-panel"/></svg>Deck</button>
  </div>

  <div class="workrow no-inspector">
    <div class="t-single">
      <div class="preview" style="padding:22px">
        <div class="slide" style="max-width:680px">
          <div class="spectrum"></div>
          <div class="slide-body" style="padding:30px 34px">
            <div class="eyebrow">The quarter in four numbers</div>
            <div class="cards">
              <div class="mini"><div class="k">$4.2M</div><div class="l">Net revenue</div></div>
              <div class="mini"><div class="k">+18%</div><div class="l">YoY growth</div></div>
              <div class="mini"><div class="k">142</div><div class="l">New logos</div></div>
              <div class="mini"><div class="k">1.4%</div><div class="l">Net churn</div></div>
            </div>
          </div>
          <div class="pg">2</div>
        </div>
        <div class="slide thumb" style="max-width:300px">
          <div class="spectrum"></div>
          <div class="slide-body" style="padding:16px 18px">
            <div class="eyebrow" style="font-size:9px">How the funnel converts</div>
            <div style="display:flex;gap:7px;align-items:center;margin-top:9px">
              <div style="flex:1;height:34px;border-radius:7px;background:var(--cat1)"></div>
              <svg class="icon xs" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
              <div style="flex:1;height:34px;border-radius:7px;background:var(--cat3)"></div>
              <svg class="icon xs" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
              <div style="flex:1;height:34px;border-radius:7px;background:var(--cat5)"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="statusline"><span class="ok"><svg class="icon xs"><use href="#i-check"/></svg>Rendered</span><span>indaco · light</span><span class="grow"></span><span>2 / 14</span></div>
    </div>
  </div>
</div>
