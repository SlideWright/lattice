<!--mode:light;w:390-->
<div class="m-shell">
  <header class="m-appbar">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></span>
    <span class="name">Q3 Board Review</span>
    <span class="appbar-spacer" style="flex:1"></span>
    <button class="iconbtn"><svg class="icon sm"><use href="#i-search"/></svg></button>
    <button class="iconbtn"><svg class="icon sm"><use href="#i-palette"/></svg></button>
    <button class="iconbtn primary"><svg class="icon sm"><use href="#i-share"/></svg></button>
  </header>

  <div class="m-tabs">
    <button><svg class="icon xs"><use href="#i-sparkles"/></svg></button>
    <button>Edit</button>
    <button class="on">Preview</button>
  </div>

  <div class="m-main">
    <div class="m-filmstrip">
      <div class="slide m-slide-full">
        <div class="spectrum"></div>
        <div class="slide-body" style="padding:18px 20px">
          <div class="eyebrow">The quarter in four numbers</div>
          <div class="cards">
            <div class="mini"><div class="k">$4.2M</div><div class="l">Net revenue</div></div>
            <div class="mini"><div class="k">+18%</div><div class="l">YoY growth</div></div>
            <div class="mini"><div class="k">142</div><div class="l">New logos</div></div>
            <div class="mini"><div class="k">1.4%</div><div class="l">Net churn</div></div>
          </div>
        </div>
        <div class="pg">2</div>
      </div>
      <div class="slide m-slide-full">
        <div class="spectrum"></div>
        <div class="slide-body" style="padding:18px 20px">
          <div class="eyebrow">How the funnel converts</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:12px">
            <div style="flex:1;height:46px;border-radius:8px;background:var(--cat1)"></div>
            <svg class="icon sm" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
            <div style="flex:1;height:46px;border-radius:8px;background:var(--cat3)"></div>
            <svg class="icon sm" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
            <div style="flex:1;height:46px;border-radius:8px;background:var(--cat5)"></div>
          </div>
        </div>
        <div class="pg">3</div>
      </div>
    </div>
    <div class="m-status">
      <span class="ok"><svg class="icon xs"><use href="#i-check"/></svg>Rendered</span>
      <span>indaco · light</span><span class="grow"></span><span>2 / 14</span>
    </div>
  </div>

  <nav class="m-bottom">
    <div class="mi on"><svg class="icon sm"><use href="#i-compose"/></svg>Compose</div>
    <div class="mi"><svg class="icon sm"><use href="#i-present"/></svg>Present</div>
    <div class="mi"><svg class="icon sm"><use href="#i-fabricate"/></svg>Build</div>
    <div class="mi"><svg class="icon sm"><use href="#i-library"/></svg>Decks</div>
  </nav>
</div>
