<!--mode:light;w:390-->
<div class="m-shell">
  <header class="m-appbar">
    <span style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--accent);color:var(--on-accent);font-weight:800;font-family:var(--font-sans);font-size:15px;flex:0 0 auto">L</span>
    <div class="m-intent2">
      <button class="on"><svg class="icon xs"><use href="#i-compose"/></svg>Compose</button>
      <button><svg class="icon xs"><use href="#i-present"/></svg>Present</button>
    </div>
    <span class="appbar-spacer" style="flex:1"></span>
    <button class="iconbtn primary"><svg class="icon sm"><use href="#i-share"/></svg></button>
    <button class="iconbtn"><svg class="icon sm"><use href="#i-settings"/></svg></button>
  </header>

  <div class="m-tabs">
    <button>Edit</button>
    <button class="on">Preview</button>
    <button><svg class="icon xs"><use href="#i-sparkles"/></svg>Architect</button>
  </div>

  <div class="m-main">
    <div class="m-filmstrip">
      <div class="slide m-slide-full">
        <div class="spectrum"></div>
        <div class="slide-body" style="padding:18px 20px">
          <div class="eyebrow">The quarter in four numbers</div>
          <div class="cards">
            <div class="mini"><div class="k">$4.2M</div><div class="l">Net revenue</div></div>
            <div class="mini"><div class="k">+18%</div><div class="l">YoY growth</div></div>
            <div class="mini"><div class="k">142</div><div class="l">New logos</div></div>
            <div class="mini"><div class="k">1.4%</div><div class="l">Net churn</div></div>
          </div>
        </div>
        <div class="pg">2</div>
      </div>
      <div class="slide m-slide-full">
        <div class="spectrum"></div>
        <div class="slide-body" style="padding:18px 20px">
          <div class="eyebrow">How the funnel converts</div>
          <div style="display:flex;gap:6px;align-items:center;margin-top:8px">
            <div style="flex:1;height:38px;border-radius:6px;background:var(--cat1)"></div>
            <svg class="icon xs" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
            <div style="flex:1;height:38px;border-radius:6px;background:var(--cat3)"></div>
            <svg class="icon xs" style="color:var(--text-muted)"><use href="#i-chevron-right"/></svg>
            <div style="flex:1;height:38px;border-radius:6px;background:var(--cat5)"></div>
          </div>
        </div>
        <div class="pg">3</div>
      </div>
    </div>
    <div class="m-status">
      <span class="ok"><svg class="icon xs"><use href="#i-check"/></svg>Rendered</span><span class="grow"></span><span>2 / 14</span>
    </div>
  </div>
</div>
