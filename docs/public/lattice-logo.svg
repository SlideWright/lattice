<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 116" role="img" aria-label="Lattice">
  <title>Lattice</title>
  <!-- Basket-weave lattice in a 16:9 slide frame: indigo (left) + leather-gold
       (right) ribbons of uneven length, interlaced over-under via a checkerboard
       clip so the weave gaps stay transparent on any background. -->
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#454a93"/><stop offset="1" stop-color="#0d1234"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eeb24c"/><stop offset="1" stop-color="#8f5a14"/></linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#46568f"/><stop offset="1" stop-color="#1f2a55"/></linearGradient>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="1.1" stdDeviation="1.2" flood-color="#0a1024" flood-opacity="0.3"/></filter><clipPath id="weave"><rect x="-16" y="-16" width="16" height="16"/><rect x="16" y="-16" width="16" height="16"/><rect x="48" y="-16" width="16" height="16"/><rect x="80" y="-16" width="16" height="16"/><rect x="112" y="-16" width="16" height="16"/><rect x="144" y="-16" width="16" height="16"/><rect x="0" y="0" width="16" height="16"/><rect x="32" y="0" width="16" height="16"/><rect x="64" y="0" width="16" height="16"/><rect x="96" y="0" width="16" height="16"/><rect x="128" y="0" width="16" height="16"/><rect x="-16" y="16" width="16" height="16"/><rect x="16" y="16" width="16" height="16"/><rect x="48" y="16" width="16" height="16"/><rect x="80" y="16" width="16" height="16"/><rect x="112" y="16" width="16" height="16"/><rect x="144" y="16" width="16" height="16"/><rect x="0" y="32" width="16" height="16"/><rect x="32" y="32" width="16" height="16"/><rect x="64" y="32" width="16" height="16"/><rect x="96" y="32" width="16" height="16"/><rect x="128" y="32" width="16" height="16"/><rect x="-16" y="48" width="16" height="16"/><rect x="16" y="48" width="16" height="16"/><rect x="48" y="48" width="16" height="16"/><rect x="80" y="48" width="16" height="16"/><rect x="112" y="48" width="16" height="16"/><rect x="144" y="48" width="16" height="16"/><rect x="0" y="64" width="16" height="16"/><rect x="32" y="64" width="16" height="16"/><rect x="64" y="64" width="16" height="16"/><rect x="96" y="64" width="16" height="16"/><rect x="128" y="64" width="16" height="16"/><rect x="-16" y="80" width="16" height="16"/><rect x="16" y="80" width="16" height="16"/><rect x="48" y="80" width="16" height="16"/><rect x="80" y="80" width="16" height="16"/><rect x="112" y="80" width="16" height="16"/><rect x="144" y="80" width="16" height="16"/><rect x="0" y="96" width="16" height="16"/><rect x="32" y="96" width="16" height="16"/><rect x="64" y="96" width="16" height="16"/><rect x="96" y="96" width="16" height="16"/><rect x="128" y="96" width="16" height="16"/><rect x="-16" y="112" width="16" height="16"/><rect x="16" y="112" width="16" height="16"/><rect x="48" y="112" width="16" height="16"/><rect x="80" y="112" width="16" height="16"/><rect x="112" y="112" width="16" height="16"/><rect x="144" y="112" width="16" height="16"/><rect x="0" y="128" width="16" height="16"/><rect x="32" y="128" width="16" height="16"/><rect x="64" y="128" width="16" height="16"/><rect x="96" y="128" width="16" height="16"/><rect x="128" y="128" width="16" height="16"/></clipPath>
  </defs>
  <rect x="22" y="26" width="88" height="64" rx="7" fill="none" stroke="url(#frame)" stroke-width="6" filter="url(#sh)"/>
  
  <g filter="url(#sh)">
    <rect x="24" y="-32" width="6" height="192" rx="0" fill="url(#navy)" transform="rotate(-28 66 58)"/><rect x="42" y="6" width="6" height="120" rx="0" fill="url(#navy)" transform="rotate(-26 66 58)"/><rect x="60" y="-16" width="6" height="162" rx="0" fill="url(#navy)" transform="rotate(-30 66 58)"/><rect x="80" y="24" width="6" height="96" rx="0" fill="url(#gold)" transform="rotate(-27 66 58)"/><rect x="99" y="-22" width="6" height="160" rx="0" fill="url(#gold)" transform="rotate(-29 66 58)"/><rect x="30" y="14" width="6" height="116" rx="0" fill="url(#navy)" transform="rotate(29 66 58)"/><rect x="49" y="-30" width="6" height="188" rx="0" fill="url(#navy)" transform="rotate(27 66 58)"/><rect x="69" y="8" width="6" height="126" rx="0" fill="url(#gold)" transform="rotate(31 66 58)"/><rect x="88" y="-30" width="6" height="192" rx="0" fill="url(#gold)" transform="rotate(28 66 58)"/><rect x="106" y="26" width="6" height="92" rx="0" fill="url(#gold)" transform="rotate(30 66 58)"/><g clip-path="url(#weave)"><rect x="24" y="-32" width="6" height="192" rx="0" fill="url(#navy)" transform="rotate(-28 66 58)"/><rect x="42" y="6" width="6" height="120" rx="0" fill="url(#navy)" transform="rotate(-26 66 58)"/><rect x="60" y="-16" width="6" height="162" rx="0" fill="url(#navy)" transform="rotate(-30 66 58)"/><rect x="80" y="24" width="6" height="96" rx="0" fill="url(#gold)" transform="rotate(-27 66 58)"/><rect x="99" y="-22" width="6" height="160" rx="0" fill="url(#gold)" transform="rotate(-29 66 58)"/></g>
  </g>
</svg>