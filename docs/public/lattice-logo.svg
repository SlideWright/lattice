<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 116" role="img" aria-label="Lattice">
  <title>Lattice</title>
  <defs>
    <!-- Cross-width gradients give each strut a metallic, beveled tube sheen.
         Spatial split: indigo struts on the left, leather-gold on the right.
         Indigo stays mid-tone so the mark also reads on a dark canvas. -->
    <linearGradient id="ll-navy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10173a"/>
      <stop offset="0.34" stop-color="#3b3f7c"/>
      <stop offset="0.5" stop-color="#5054a0"/>
      <stop offset="0.68" stop-color="#2a2e5e"/>
      <stop offset="1" stop-color="#0c1130"/>
    </linearGradient>
    <linearGradient id="ll-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a5e16"/>
      <stop offset="0.34" stop-color="#d79c38"/>
      <stop offset="0.5" stop-color="#f3c75f"/>
      <stop offset="0.68" stop-color="#c2862a"/>
      <stop offset="1" stop-color="#8a5a14"/>
    </linearGradient>
    <linearGradient id="ll-mix1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c2c64"/>
      <stop offset="0.5" stop-color="#7a6a55"/>
      <stop offset="1" stop-color="#c68f33"/>
    </linearGradient>
    <linearGradient id="ll-mix2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#212150"/>
      <stop offset="0.5" stop-color="#86714e"/>
      <stop offset="1" stop-color="#d89c39"/>
    </linearGradient>
    <linearGradient id="ll-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36467a"/>
      <stop offset="1" stop-color="#1b2350"/>
    </linearGradient>
    <filter id="ll-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.1" stdDeviation="1.2" flood-color="#0a1024" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 16:9 presentation-slide frame -->
  <rect x="22" y="26" width="88" height="64" rx="7" fill="none"
        stroke="url(#ll-frame)" stroke-width="5" filter="url(#ll-shadow)"/>

  <!-- Interlacing struts of UNEVEN length, staggered start/end, in two mirrored
       near-vertical diagonals. Indigo gathers left, gold right. Each is a beveled
       ribbon; varied lengths give the hand-woven lattice its irregular weave. -->
  <g filter="url(#ll-shadow)">
    <!-- leaning one way -->
    <rect x="25"  y="-26" width="5.5" height="178" rx="2" fill="url(#ll-navy)" transform="rotate(-28 66 58)"/>
    <rect x="43"  y="10"  width="5.5" height="112" rx="2" fill="url(#ll-navy)" transform="rotate(-26 66 58)"/>
    <rect x="61"  y="-12" width="5.5" height="152" rx="2" fill="url(#ll-mix1)" transform="rotate(-30 66 58)"/>
    <rect x="80"  y="26"  width="5.5" height="88"  rx="2" fill="url(#ll-gold)" transform="rotate(-27 66 58)"/>
    <rect x="97"  y="-18" width="5.5" height="150" rx="2" fill="url(#ll-gold)" transform="rotate(-29 66 58)"/>
    <!-- leaning the other way -->
    <rect x="31"  y="16"  width="5.5" height="108" rx="2" fill="url(#ll-navy)" transform="rotate(29 66 58)"/>
    <rect x="50"  y="-22" width="5.5" height="170" rx="2" fill="url(#ll-navy)" transform="rotate(27 66 58)"/>
    <rect x="68"  y="12"  width="5.5" height="116" rx="2" fill="url(#ll-mix2)" transform="rotate(31 66 58)"/>
    <rect x="86"  y="-24" width="5.5" height="178" rx="2" fill="url(#ll-gold)" transform="rotate(28 66 58)"/>
    <rect x="103" y="28"  width="5.5" height="86"  rx="2" fill="url(#ll-gold)" transform="rotate(30 66 58)"/>
  </g>
</svg>
