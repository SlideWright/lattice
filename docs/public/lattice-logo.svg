<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 116" role="img" aria-label="Lattice">
  <title>Lattice</title>
  <defs>
    <!-- Cross-width gradients give each strut a metallic, beveled tube sheen.
         Spatial split: navy struts on the left, gold on the right. Navy stays
         mid-indigo so the mark also reads on a dark canvas. -->
    <linearGradient id="ll-navy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10173a"/>
      <stop offset="0.34" stop-color="#3b3f7c"/>
      <stop offset="0.5" stop-color="#5054a0"/>
      <stop offset="0.68" stop-color="#2a2e5e"/>
      <stop offset="1" stop-color="#0c1130"/>
    </linearGradient>
    <linearGradient id="ll-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a5e16"/>
      <stop offset="0.34" stop-color="#d79c38"/>
      <stop offset="0.5" stop-color="#f3c75f"/>
      <stop offset="0.68" stop-color="#c2862a"/>
      <stop offset="1" stop-color="#8a5a14"/>
    </linearGradient>
    <linearGradient id="ll-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4a82"/>
      <stop offset="1" stop-color="#161d44"/>
    </linearGradient>
    <filter id="ll-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.4" flood-color="#0a1024" flood-opacity="0.34"/>
    </filter>
  </defs>

  <!-- Landscape frame -->
  <rect x="22" y="26" width="88" height="64" rx="6" fill="none"
        stroke="url(#ll-frame)" stroke-width="5" filter="url(#ll-glow)"/>

  <!-- Beveled struts in two mirrored, near-vertical diagonals. Flat ends read
       as angled ribbon cuts once rotated. dx<0 ⇒ navy (left), dx>0 ⇒ gold. -->
  <g filter="url(#ll-glow)">
    <!-- leaning right ( / ) -->
    <rect x="24.5" y="-24" width="7" height="164" fill="url(#ll-navy)" transform="rotate(-25 66 58)"/>
    <rect x="48.5" y="-24" width="7" height="164" fill="url(#ll-navy)" transform="rotate(-25 66 58)"/>
    <rect x="76.5" y="-24" width="7" height="164" fill="url(#ll-gold)" transform="rotate(-25 66 58)"/>
    <rect x="98.5" y="-24" width="7" height="164" fill="url(#ll-gold)" transform="rotate(-25 66 58)"/>
    <!-- leaning left ( \ ) -->
    <rect x="34.5" y="-24" width="7" height="164" fill="url(#ll-navy)" transform="rotate(25 66 58)"/>
    <rect x="58.5" y="-24" width="7" height="164" fill="url(#ll-navy)" transform="rotate(25 66 58)"/>
    <rect x="84.5" y="-24" width="7" height="164" fill="url(#ll-gold)" transform="rotate(25 66 58)"/>
    <rect x="104.5" y="-24" width="7" height="164" fill="url(#ll-gold)" transform="rotate(25 66 58)"/>
  </g>
</svg>
