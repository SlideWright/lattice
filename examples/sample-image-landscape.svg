<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- 16:9 landscape sample — same brand vocabulary as the other samples,
       wider canvas so it demonstrates the cover-crop behaviour when slotted
       into a half-canvas (8:9) image slide. The horizon line, sun glow,
       and constellation network read whether cropped (default cover) or
       letterboxed (image contain). -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#001D33"/>
      <stop offset="55%" stop-color="#003D66"/>
      <stop offset="100%" stop-color="#00558C"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F5D17A" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#C9A24A" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#C9A24A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="lattice-l" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 32L32 0L64 32L32 64Z" fill="none" stroke="#4A8FBF" stroke-width="0.9" opacity="0.32"/>
      <circle cx="32" cy="32" r="1.4" fill="#C9A24A" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- canvas + lattice wash -->
  <rect width="1280" height="720" fill="url(#sky)"/>
  <rect width="1280" height="720" fill="url(#lattice-l)"/>

  <!-- horizon hairline -->
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#C9A24A" stroke-width="1" stroke-opacity="0.5"/>

  <!-- sun / focal glow -->
  <circle cx="900" cy="430" r="190" fill="url(#sun)"/>
  <circle cx="900" cy="430" r="22"  fill="#F5D17A"/>

  <!-- constellation network — left → right narrative arc -->
  <g stroke="#C9A24A" stroke-width="2" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M120 240 L260 200 L420 280 L580 220 L760 290 L920 250"/>
    <path d="M260 200 L320 360 L480 410" opacity="0.55"/>
    <path d="M580 220 L660 130 L820 170" opacity="0.55"/>
    <path d="M760 290 L880 380 L1040 340" opacity="0.55"/>
    <path d="M420 280 L520 530 L680 580" opacity="0.45"/>
  </g>

  <!-- primary nodes -->
  <g>
    <circle cx="120"  cy="240" r="38" fill="url(#sun)"/>
    <circle cx="120"  cy="240" r="11" fill="#C9A24A"/>
    <circle cx="420"  cy="280" r="36" fill="url(#sun)" opacity="0.9"/>
    <circle cx="420"  cy="280" r="10" fill="#FFFFFF"/>
    <circle cx="760"  cy="290" r="40" fill="url(#sun)"/>
    <circle cx="760"  cy="290" r="12" fill="#FFFFFF"/>
    <circle cx="1100" cy="220" r="42" fill="url(#sun)"/>
    <circle cx="1100" cy="220" r="14" fill="#C9A24A"/>
  </g>

  <!-- secondary nodes -->
  <g fill="#FFFFFF" opacity="0.75">
    <circle cx="260"  cy="200" r="6"/>
    <circle cx="580"  cy="220" r="6"/>
    <circle cx="920"  cy="250" r="6"/>
    <circle cx="320"  cy="360" r="5"/>
    <circle cx="480"  cy="410" r="5"/>
    <circle cx="660"  cy="130" r="5"/>
    <circle cx="820"  cy="170" r="5"/>
    <circle cx="880"  cy="380" r="5"/>
    <circle cx="1040" cy="340" r="5"/>
    <circle cx="520"  cy="530" r="4" opacity="0.6"/>
    <circle cx="680"  cy="580" r="4" opacity="0.6"/>
  </g>

  <!-- subtle horizontal scanlines for depth -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
  </g>
</svg>
