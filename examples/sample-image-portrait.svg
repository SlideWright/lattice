<svg xmlns="http://www.w3.org/2000/svg" width="540" height="900" viewBox="0 0 540 900">
  <defs>
    <pattern id="lattice-p" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30L30 0L60 30L30 60Z" fill="none" stroke="#4A8FBF" stroke-width="0.8" opacity="0.35"/>
      <circle cx="30" cy="30" r="1.4" fill="#C9A24A" opacity="0.55"/>
    </pattern>
    <radialGradient id="glow-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A24A" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#C9A24A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A24A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="540" height="900" fill="#003D66"/>
  <rect width="540" height="900" fill="url(#lattice-p)"/>

  <!-- vertical signal pipeline: ingest → classify → score → decide → distribute -->
  <path d="M270 120 L270 250 L200 340 L270 430 L340 540 L270 640 L270 780"
        fill="none" stroke="#C9A24A" stroke-width="2.4" stroke-opacity="0.75"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- branch tributaries -->
  <path d="M270 250 L120 320" fill="none" stroke="#C9A24A" stroke-width="1.4" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M270 430 L420 470" fill="none" stroke="#C9A24A" stroke-width="1.4" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M270 640 L150 700" fill="none" stroke="#C9A24A" stroke-width="1.4" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- primary nodes -->
  <circle cx="270" cy="120" r="46" fill="url(#glow-p)"/>
  <circle cx="270" cy="120" r="9" fill="#C9A24A"/>
  <circle cx="270" cy="120" r="3.2" fill="#FFFFFF"/>

  <circle cx="200" cy="340" r="38" fill="url(#glow-p)"/>
  <circle cx="200" cy="340" r="7" fill="#C9A24A"/>

  <circle cx="340" cy="540" r="38" fill="url(#glow-p)"/>
  <circle cx="340" cy="540" r="7" fill="#C9A24A"/>

  <circle cx="270" cy="780" r="50" fill="url(#glow-p)"/>
  <circle cx="270" cy="780" r="11" fill="#C9A24A"/>
  <circle cx="270" cy="780" r="3.6" fill="#FFFFFF"/>

  <!-- secondary nodes -->
  <circle cx="120" cy="320" r="4" fill="#FFFFFF" fill-opacity="0.7"/>
  <circle cx="420" cy="470" r="4" fill="#FFFFFF" fill-opacity="0.7"/>
  <circle cx="150" cy="700" r="4" fill="#FFFFFF" fill-opacity="0.7"/>

  <!-- subtle vertical scanlines for depth -->
  <line x1="60"  y1="0" x2="60"  y2="900" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="270" y1="0" x2="270" y2="900" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="900" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
</svg>
