<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDF0F4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#E8ECF2"/>
    </linearGradient>
  </defs>
  <!-- White/light background — simulates bright photography or whiteboard -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <g stroke="#D8DCE5" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>
  <!-- Chart placeholder — light bars on white -->
  <rect x="200" y="200" width="80" height="300" rx="4" fill="#C8D0DC" opacity="0.7"/>
  <rect x="320" y="280" width="80" height="220" rx="4" fill="#B8C4D4" opacity="0.7"/>
  <rect x="440" y="160" width="80" height="340" rx="4" fill="#C0CCDA" opacity="0.7"/>
  <rect x="560" y="320" width="80" height="180" rx="4" fill="#C8D0DC" opacity="0.7"/>
  <rect x="680" y="220" width="80" height="280" rx="4" fill="#B8C4D4" opacity="0.7"/>
  <rect x="800" y="140" width="80" height="360" rx="4" fill="#C0CCDA" opacity="0.7"/>
  <rect x="920" y="260" width="80" height="240" rx="4" fill="#C8D0DC" opacity="0.7"/>
  <!-- Baseline -->
  <line x1="160" y1="500" x2="1060" y2="500" stroke="#B0B8C8" stroke-width="1.5"/>
  <!-- Watermark text -->
  <text x="640" y="620" font-family="system-ui,sans-serif" font-size="11" fill="#B0B8C8" text-anchor="middle" letter-spacing="0.2em">SAMPLE · LIGHT IMAGE · image-light MODIFIER DEMO</text>
</svg>
