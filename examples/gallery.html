<p><em>A decision framework for product leaders navigating market uncertainty</em></p>
<footer>Title slide · title</footer>

<h5 id="section-01--foundations">Section 01 · Foundations</h5>
<h1 id="the-landscape-has-shifted-here-is-what-that-means-for-us">The landscape has shifted. Here is what that means for us.</h1>
<footer>Section break · divider</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="subtopic" data-footer="Centered orientation · subtopic" data-theme="indaco" lang="en-US" class="subtopic" data-marpit-pagination="3" style="--paginate:true;--header:Lattice · Layout Gallery;--class:subtopic;--footer:Centered orientation · subtopic;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">

<h5 id="module-02">Module 02</h5>
<h2 id="before-we-score-signals-we-need-to-agree-on-what-a-signal-is">Before we score signals, we need to agree on what a signal is.</h2>
<p>The word is overloaded. We use it to mean anything from a customer complaint to a macro trend. This framework requires a tighter definition.</p>
<footer>Centered orientation · subtopic</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="content" data-footer="Single-idea prose · content" data-theme="indaco" lang="en-US" class="content" data-marpit-pagination="4" style="--paginate:true;--header:Lattice · Layout Gallery;--class:content;--footer:Single-idea prose · content;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h3 id="context--competitive-dynamics">Context · Competitive Dynamics</h3>
<h2 id="the-window-for-differentiation-is-narrowing">The window for differentiation is narrowing.</h2>
<p>Three converging forces — commoditized infrastructure, compressed release cycles, and rising customer switching costs — have reduced the average durable advantage window from 36 months to under 14. Teams that cannot identify signal from noise in that window will consistently miss timing.</p>
<footer>Single-idea prose · content</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="diagram" data-footer="Component diagram · diagram" data-theme="indaco" lang="en-US" class="diagram" data-marpit-pagination="5" style="--paginate:true;--header:Lattice · Layout Gallery;--class:diagram;--footer:Component diagram · diagram;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h3 id="architecture--signal-pipeline">Architecture · Signal Pipeline</h3>
<h2 id="how-signals-move-from-input-to-decision">How signals move from input to decision.</h2>
<p><em>Four-stage processing pipeline — weekly cadence</em></p>
<pre><code class="language-mermaid">flowchart LR
  A[&quot;Raw Signals&quot;] --&gt; B[&quot;Classify&quot;]
  B --&gt; C[&quot;Score &amp; Weight&quot;]
  C --&gt; D[&quot;Decision Log&quot;]
  D -.-&gt;|&quot;weekly retrospective&quot;| B
</code></pre>
<footer>Component diagram · diagram</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="two-column" data-footer="Text + visual split · two-column" data-theme="indaco" lang="en-US" class="two-column" data-marpit-pagination="6" style="--paginate:true;--header:Lattice · Layout Gallery;--class:two-column;--footer:Text + visual split · two-column;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h3 id="overview--framework-design">Overview · Framework Design</h3>
<h2 id="built-for-speed-without-sacrificing-rigor">Built for speed without sacrificing rigor.</h2>
<p>The framework was designed around a hard constraint: product decisions must close in 72 hours or the opportunity cost of delay exceeds the cost of a suboptimal decision. Every component is optimized for that window.</p>
<blockquote>
<p>Visual: decision velocity vs. decision quality scatter plot — 72-hour decision window highlighted</p>
</blockquote>
<footer>Text + visual split · two-column</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="stats" data-footer="KPI numbers · stats" data-theme="indaco" lang="en-US" class="stats" data-marpit-pagination="7" style="--paginate:true;--header:Lattice · Layout Gallery;--class:stats;--footer:KPI numbers · stats;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h3 id="impact--pilot-results">Impact · Pilot Results</h3>
<h2 id="six-months-of-results-across-four-product-teams">Six months of results across four product teams.</h2>
<p><em>Measured against pre-framework baseline, same teams, same market conditions.</em></p>
<ol>
<li><strong>73%</strong> faster close</li>
<li><strong>4.2×</strong> signal recall</li>
<li><strong>18</strong> decisions logged</li>
<li><strong>91%</strong> team alignment</li>
</ol>
<footer>KPI numbers · stats</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="card-grid" data-footer="2×2 card grid · card-grid" data-theme="indaco" lang="en-US" class="card-grid" data-marpit-pagination="8" style="--paginate:true;--header:Lattice · Layout Gallery;--class:card-grid;--footer:2×2 card grid · card-grid;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h2 id="the-framework-has-four-components">The framework has four components.</h2>
<ul>
<li>Signal Intake
<ul>
<li>Weekly structured collection across customer conversations, market data, and competitive moves. Normalized into a common schema before scoring.</li>
</ul>
</li>
<li>Scoring Model
<ul>
<li>Each signal scored on three dimensions: confidence, recency, and strategic relevance. Weights are team-configurable and reviewed quarterly.</li>
</ul>
</li>
<li>Decision Log
<ul>
<li>Every decision recorded with the signals that informed it, the options considered, and the criteria applied. Feeds the calibration loop.</li>
</ul>
</li>
<li>Calibration Loop
<ul>
<li>Monthly retrospective that compares predicted outcomes to actual outcomes and adjusts scoring weights accordingly.</li>
</ul>
</li>
</ul>
<footer>2×2 card grid · card-grid</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="card-grid" data-footer="2 top + 1 bottom · card-grid" data-theme="indaco" lang="en-US" class="card-grid" data-marpit-pagination="9" style="--paginate:true;--header:Lattice · Layout Gallery;--class:card-grid;--footer:2 top + 1 bottom · card-grid;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h2 id="signal-intake-produces-three-outputs">Signal Intake produces three outputs.</h2>
<ol>
<li>Weekly Signal Brief
<ul>
<li>A ranked list of the top 10 signals from the prior week, with confidence scores and source attribution. Distributed to product leads every Monday morning.</li>
</ul>
</li>
<li>Anomaly Alerts
<ul>
<li>Real-time flags when a signal exceeds the 2σ threshold on any dimension. Routed directly to the accountable PM with a 4-hour response SLA.</li>
</ul>
</li>
<li>Monthly Signal Index
<ul>
<li>The source of truth for the calibration loop. A complete record of all signals logged, scored, and resolved in the prior month. Required reading before each retrospective.</li>
</ul>
</li>
</ol>
<footer>2 top + 1 bottom · card-grid</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="cards-stacked" data-footer="Vertical card stack · cards-stacked" data-theme="indaco" lang="en-US" class="cards-stacked" data-marpit-pagination="10" style="--paginate:true;--header:Lattice · Layout Gallery;--class:cards-stacked;--footer:Vertical card stack · cards-stacked;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h2 id="two-failure-modes-the-framework-is-designed-to-prevent">Two failure modes the framework is designed to prevent.</h2>
<p><strong>False signal amplification.</strong> A single loud voice — one enterprise customer, one analyst report, one competitive announcement — dominates the decision without being weighed against the full signal set. The scoring model prevents any single source from exceeding 30% of the total signal weight in a given decision.</p>
<p><strong>Signal hoarding.</strong> Teams collect signals but do not log decisions, so the calibration loop has nothing to learn from. The Decision Log is a required artifact for any prioritization change above P2 severity. No log, no change.</p>
<footer>Vertical card stack · cards-stacked</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="card-grid" data-footer="Side-by-side cards · card-grid" data-theme="indaco" lang="en-US" class="card-grid" data-marpit-pagination="11" style="--paginate:true;--header:Lattice · Layout Gallery;--class:card-grid;--footer:Side-by-side cards · card-grid;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h2 id="two-intake-modes-for-different-signal-types">Two intake modes for different signal types.</h2>
<ul>
<li>Structured Intake
<ul>
<li>Signals with clear schema: NPS verbatims, support ticket categories, feature request volumes, win/loss notes. Ingested automatically via API connectors. Scored on arrival. Zero manual handling.</li>
</ul>
</li>
<li>Unstructured Intake
<ul>
<li>Signals without schema: field observations, conference conversations, analyst briefings, competitive demos. Require human classification before scoring. Routed to the signal owner for a 48-hour classification window.</li>
</ul>
</li>
</ul>
<footer>Side-by-side cards · card-grid</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="comparison" data-footer="Two options + connector · comparison" data-theme="indaco" lang="en-US" class="comparison" data-marpit-pagination="12" style="--paginate:true;--header:Lattice · Layout Gallery;--class:comparison;--footer:Two options + connector · comparison;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<h2 id="scoring-model-before-and-after-the-calibration-loop">Scoring model: before and after the calibration loop.</h2>
<ul>
<li>Before Calibration
<ul>
<li>Equal weights across all three dimensions. Confidence, recency, and relevance each contribute 33% to the final score. Simple, consistent, but blind to what your market actually rewards.</li>
</ul>
</li>
<li>After Calibration
<ul>
<li>Weights reflect your team's historical signal accuracy. If recency has consistently been the weakest predictor for your product, it gets downweighted. The model becomes a record of what you have learned.</li>
</ul>
</li>
</ul>
<p>The shift from equal weights to calibrated weights takes two retrospective cycles — roughly 60 days from adoption.</p>
<footer>Two options + connector · comparison</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="Lattice · Layout Gallery" data-class="quote" data-footer="Pull quote · quote" data-theme="indaco" lang="en-US" class="quote" data-marpit-pagination="13" style="--paginate:true;--header:Lattice · Layout Gallery;--class:quote;--footer:Pull quote · quote;--theme:indaco;" data-marpit-pagination-total="39" data-size="16:9">
<header>Lattice · Layout Gallery</header>

<blockquote>
<p>The signal was always there. We just didn't have a system that forced us to look at it before we'd already decided.</p>
</blockquote>

<h2 id="what-the-framework-does-not-do">What the framework does not do.</h2>
<ul>
<li>It does not make decisions — it structures the information that humans use to decide.</li>
<li>It does not replace customer discovery — it scores and routes what discovery surfaces.</li>
<li>It does not work without the Decision Log — calibration requires outcome data to learn from.</li>
<li>It does not guarantee alignment — it surfaces disagreement earlier, which still requires resolution.</li>
<li>It does not scale down to individual feature decisions — it is designed for prioritization above P2.</li>
</ul>

<h2 id="scoring-model-deep-dive">Scoring Model Deep Dive</h2>
<h5 id="section-02">Section 02</h5>
<h3 id="what-this-section-covers">What this section covers</h3>
<p>The scoring model is the most configurable component. This section covers the three dimensions, how weights are set initially, and how calibration updates them over time.</p>
<ol>
<li><strong>Confidence</strong>
<ul>
<li>How many independent sources corroborate the signal. Ranges 1–5.</li>

</li>
<li><strong>Recency</strong>
<ul>
<li>Time-decay applied from signal date to scoring date. Half-life is team-configurable.</li>
</ul>
</li>
<li><strong>Strategic Relevance</strong>
<ul>
<li>Manual score from the signal owner. Ranges 1–5. Requires justification above 4.</li>
</ul>
</li>
</ol>

<h3 id="finding-01--structured-intake">Finding 01 · Structured Intake</h3>
<h2 id="structured-intake-performed-above-expectations--volume-and-latency-were-not-concerns">Structured intake performed above expectations — volume and latency were not concerns.</h2>
<ul>
<li><strong>What worked</strong>
<ul>
<li>API connectors handled 94% of structured signals without manual intervention. Average scoring latency was 4 minutes from ingestion. Schema normalization held across all five connected sources.</li>
</ul>
</li>
<li><strong>What required tuning</strong>
<ul>
<li>NPS verbatim classification had an 18% error rate in the first two weeks. Required a training pass on the classification model before accuracy reached the 92% target.</li>
</ul>
</li>
</ul>
<p><em>Viable as designed — NLP classification requires a 2-week warm-up period on new deployments.</em></p>
<footer>Finding + key insight · finding</footer>
</section>

<header>Lattice · Layout Gallery</header>

<h2 id="three-scoring-failure-modes-found-in-the-pilot">Three scoring failure modes found in the pilot.</h2>
<ol>
<li><strong>Recency dominance</strong>
<ul>
<li>High-recency noise crowding out durable signal. Teams set recency weight above 50% in the first calibration pass. Corrected by capping recency weight at 40% until two calibration cycles complete.</li>
</ul>
</li>
<li><strong>Source concentration</strong>
<ul>
<li>Single-customer signals inflating confidence scores. One enterprise customer's verbatims represented 34% of all structured intake in month one. Corrected by adding a source-diversity floor to the scoring model.</li>
</ul>
</li>
<li><strong>Outcome misclassification</strong>
<ul>
<li>PMs logging predicted outcomes that were too vague to score at retrospective. &quot;Improve retention&quot; is not scoreable. &quot;Reduce 30-day churn from 8.2% to below 7%&quot; is.</li>
</ul>
</li>
</ol>
<footer>3 full-width cards · cards-wide-3</footer>
</section>

<header>Lattice · Layout Gallery</header>

<h2 id="four-requirements-every-decision-system-must-meet">Four requirements every decision system must meet.</h2>
<ul>
<li><strong>Speed</strong>
<ul>
<li>Decisions must close within the window they are relevant to. Systems that add latency consume the value they exist to protect.</li>
</ul>
</li>
<li><strong>Auditability</strong>
<ul>
<li>Every prioritization decision above a threshold must carry a traceable rationale. Required for alignment and compliance.</li>
</ul>
</li>
<li><strong>Adoption</strong>
<ul>
<li>If the team won't use it weekly, calibration never runs and the model never improves. Ninety minutes per PM is the ceiling.</li>
</ul>
</li>
<li><strong>Calibration</strong>
<ul>
<li>The system must improve over time. A static scoring model is a spreadsheet with extra steps.</li>
</ul>
</li>
</ul>

<h2 id="how-to-roll-this-out-across-your-organization">How to roll this out across your organization.</h2>
<ol>
<li>Pick one team and one decision type
<ul>
<li>Start with a team that already has a regular prioritization rhythm. Apply the framework only to a single decision category for the first 30 days.</li>
</ul>
</li>
<li>Log everything, decide nothing differently
<ul>
<li>In the first month, do not change how you make decisions. Just log signals and decisions as you would have made them anyway.</li>
</ul>
</li>
<li>Run your first retrospective
<ul>
<li>At day 30, score the logged decisions against outcomes. This is where the model gets its first calibration pass.</li>
</ul>
</li>
<li>Expand to a second team
<ul>
<li>With one retrospective complete, you have evidence. Use it to onboard the second team with real data, not promises.</li>

<h3 id="implementation--token-pipeline">Implementation · Token Pipeline</h3>
<h2 id="the-tokenization-call-is-three-lines-of-application-code">The tokenization call is three lines of application code.</h2>
<h3 id="javascript--sdk-v2-interface">JavaScript · SDK v2 interface</h3>
<pre><code class="language-javascript"><span class="hljs-keyword">import</span> { <span class="hljs-title class_">TokenVault</span> } <span class="hljs-keyword">from</span> <span class="hljs-string">&quot;@company/token-sdk&quot;</span>;

<span class="hljs-keyword">const</span> vault = <span class="hljs-keyword">new</span> <span class="hljs-title class_">TokenVault</span>({ <span class="hljs-attr">keyFile</span>: <span class="hljs-string">&quot;./vault.key&quot;</span> });

<span class="hljs-comment">// Tokenize at ingestion</span>
<span class="hljs-keyword">const</span> token = <span class="hljs-keyword">await</span> vault.<span class="hljs-title function_">tokenize</span>(ssn, { <span class="hljs-attr">field</span>: <span class="hljs-string">&quot;ssn&quot;</span>, <span class="hljs-attr">tenant</span>: <span class="hljs-string">&quot;acme&quot;</span> });

<span class="hljs-comment">// Detokenize only at point of use — every call is logged</span>
<span class="hljs-keyword">const</span> plaintext = <span class="hljs-keyword">await</span> vault.<span class="hljs-title function_">detokenize</span>(token, { <span class="hljs-attr">requestor</span>: <span class="hljs-string">&quot;claims-svc&quot;</span> });
</code></pre>

<h3 id="before--after--key-distribution">Before &amp; After · Key Distribution</h3>
<h2 id="file-distributed-keys-versus-vault-integrated-keys">File-distributed keys versus vault-integrated keys.</h2>
<h3 id="before--file-distributed">Before · File-distributed</h3>
<pre><code class="language-python"><span class="hljs-comment"># Key material on disk — anyone with</span>
<span class="hljs-comment"># filesystem access can read it</span>
<span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(<span class="hljs-string">&#x27;./vault.key&#x27;</span>, <span class="hljs-string">&#x27;rb&#x27;</span>) <span class="hljs-keyword">as</span> f:
    key = f.read()

cipher = AES(key)
token = cipher.encrypt(ssn)
</code></pre>
<h3 id="after--hsm--kms-integrated">After · HSM / KMS integrated</h3>
<pre><code class="language-python"><span class="hljs-comment"># Key never leaves the HSM —</span>
<span class="hljs-comment"># every operation is audited</span>
<span class="hljs-keyword">import</span> boto3

kms = boto3.client(<span class="hljs-string">&#x27;kms&#x27;</span>)
token = kms.encrypt(
    KeyId=<span class="hljs-string">&#x27;alias/tokenization&#x27;</span>,
    Plaintext=ssn
)[<span class="hljs-string">&#x27;CiphertextBlob&#x27;</span>]
</code></pre>

<p>Use <code>_class: image</code> with <code>![bg right](url)</code> — image-right is the default. Add <code>left</code> to flip: <code>_class: image left</code>.</p>

<h3 id="dark-variant--content">Dark Variant · Content</h3>
<h2 id="the-token-system-handles-dark-without-per-element-overrides">The token system handles dark without per-element overrides.</h2>
<p>All colours reference CSS variables — <code>--bg</code>, <code>--text-heading</code>, <code>--text-body</code>, <code>--border</code> — that remap when <code>dark</code> is added. Cards, headings, body text, and borders all shift automatically. The spectrum bar is suppressed on dark slides.</p>

<h3 id="dark-variant--list">Dark Variant · List</h3>
<h2 id="the-card-stack-renders-cleanly-on-dark-backgrounds">The card stack renders cleanly on dark backgrounds.</h2>
<ul>
<li>Every card uses <code>--bg-alt</code> for fill and <code>--border</code> for the border — both remap in dark mode.</li>
<li>The accent left border uses <code>--accent</code> which is unchanged — the gold reads well against dark.</li>
<li>Body text shifts to <code>--text-body</code> which in dark mode is a warm light tone, not pure white.</li>
</ul>
<footer>Dark variant — list · list dark</footer>
