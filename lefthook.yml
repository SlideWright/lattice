# Lefthook configuration — pre-commit, pre-push, and commit-msg hooks.
#
# `lefthook install` wires the .git/hooks symlinks; the package.json
# `prepare` script runs that on `npm install` so contributors get the
# hooks automatically.
#
# Bypass with `git commit --no-verify` only as a last resort — if a hook
# fails, fix the root cause instead of skipping it.

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,mjs,cjs,json,ts,tsx}'
      run: npx biome check --no-errors-on-unmatched {staged_files}
    - name: affected-tests
      # Maps staged files → scoped test scripts and runs only those.
      # Falls back to the full unit suite for cross-cutting changes
      # (lattice-emulator.js, lattice.css, package.json, …). The full
      # suite still runs in pre-push as a safety net.
      run: node tools/affected-tests.js {staged_files}
    - name: lint-deck
      # Author-facing footgun checks on staged decks (--strict): card-style
      # inline `- **Title.** body` and ordered-list `**bold**` (silent render
      # corruption) and unknown `_class` tokens (typos / undeclared variants)
      # all block the commit. The repo-wide pass runs in CI (lint:deck:all).
      # Skippable via --no-verify only as last resort.
      glob:
        - 'examples/*.md'
        - 'test/integration/baseline-decks/*.md'
        - 'lib/components/**/*.gallery.md'
        - 'lib/integrations/**/*.gallery.md'
      run: node tools/lint-deck.js --strict {staged_files}
    - name: pdf-rebuild
      # Auto-rebuilds + re-stages the PDF for every staged deck markdown,
      # incrementally — only the decks whose source changed. Supersedes
      # the old check-pdf-freshness.sh *gate* (which failed on stale and
      # made you rebuild by hand): the PDF is a derived artifact, so the
      # hook regenerates it for you. Scope is markdown-only; component
      # CSS / shared CSS / engine changes affect many decks at once and
      # stay in CI (build:galleries:check). The tool queries the git
      # index directly, so the glob only decides whether it runs.
      # Skippable via `git commit --no-verify` only as a last resort.
      glob:
        - 'examples/*.md'
        - 'test/integration/baseline-decks/*.md'
        - 'lib/components/**/*.gallery.md'
      run: node tools/build-staged-pdfs.js
    - name: runtime-bundle-freshness
      # Catches the "edited a runtime-bundle source, forgot to rebuild
      # lattice-runtime.js" failure mode. The esbuild bundle entry is
      # lib/runtime/index.js; it pulls in lib/transformers/** (the
      # registry + adapters), their lib/core/** kernels, and the
      # per-component *.transform.js files. Cheap rebuild-to-tmp +
      # byte-diff via npm run runtime:check.
      # Skippable via `git commit --no-verify` only as a last resort.
      glob:
        - 'lib/runtime/**/*'
        - 'lib/transformers/**/*.js'
        - 'lib/core/**/*.js'
        - 'lib/components/**/*.transform.js'
      run: npm run runtime:check --silent
    - name: emulator-bundle-freshness
      # Catches the "edited the emulator or a module it inlines, forgot to
      # rebuild dist/lattice-emulator.js" failure mode. The esbuild bundle
      # entry is lattice-emulator.js; it inlines the local graph
      # (lib/core, lib/transformers, lib/components/*.transform, lib/integrations,
      # marp.config.js). node_modules deps stay external, so dep bumps don't
      # need a rebuild. Cheap rebuild-to-tmp + byte-diff via emulator:check.
      # package.json is in the glob because the bundle inlines it
      # (require('./package.json') for --version), so a version/script edit
      # restales the bundle.
      # Skippable via `git commit --no-verify` only as a last resort.
      glob:
        - 'lattice-emulator.js'
        - 'marp.config.js'
        - 'package.json'
        - 'lib/core/**/*.js'
        - 'lib/transformers/**/*.js'
        - 'lib/components/**/*.transform.js'
        - 'lib/integrations/**/*.js'
      run: npm run emulator:check --silent
    - name: theme-core-bundle-freshness
      # Catches "edited lib/theme/*, forgot to rebuild the docs-site Theme
      # Studio bundle docs/src/playground/theme-core.generated.js" (the
      # Workbench imports it; raw lib/theme can't be browser-imported because
      # its modules require() each other). Cheap esbuild rebuild-to-buffer +
      # byte-diff via npm run theme-core:check.
      # Skippable via `git commit --no-verify` only as a last resort.
      glob:
        - 'lib/theme/**/*.js'
        - 'tools/build-theme-core.js'
      run: npm run theme-core:check --silent
    - name: layout-core-bundle-freshness
      # Form-layer sibling of theme-core-bundle-freshness: catches "edited
      # lib/layout/*, forgot to rebuild docs/src/playground/layout-core.generated.js"
      # (the Workbench's Layout Studio imports it). Same cheap esbuild
      # rebuild-to-buffer + byte-diff via npm run layout-core:check.
      glob:
        - 'lib/layout/**/*.js'
        - 'tools/build-layout-core.js'
      run: npm run layout-core:check --silent
    - name: authoring-core-bundle-freshness
      # Sibling of theme/layout-core-bundle-freshness: catches "edited an
      # authoring engine (lint-core/review-core/scorecard), forgot to rebuild
      # docs/src/playground/authoring-core.generated.js" (the Drawing Board's
      # Architect + Coach import it; raw lib/authoring CJS can't be browser-
      # imported in `astro dev`). Same cheap esbuild rebuild-to-buffer +
      # byte-diff via npm run authoring-core:check.
      glob:
        - 'lib/authoring/lint-core.js'
        - 'lib/authoring/review-core.js'
        - 'lib/authoring/scorecard.js'
        - 'tools/build-authoring-core.js'
      run: npm run authoring-core:check --silent
    - name: standalone-core-bundle-freshness
      # Sibling of the theme/layout/authoring core gates: catches "edited
      # lib/components/chart/_chart-family/standalone-svg.js, forgot to rebuild
      # docs/src/playground/standalone-svg.generated.js" (the Drawing Board's
      # "download chart as SVG" action imports it; the raw CJS module can't be
      # browser-imported in `astro dev`). Same cheap esbuild rebuild-to-buffer +
      # byte-diff via npm run standalone-core:check.
      glob:
        - 'lib/components/chart/_chart-family/standalone-svg.js'
        - 'tools/build-standalone-core.js'
      run: npm run standalone-core:check --silent
    - name: dist-readme-freshness
      # Catches "changed which files dist/ ships (or their descriptions),
      # forgot to regenerate dist/README.md". The README indexes dist/
      # structure, so the generator itself is the trigger; structural
      # additions are otherwise caught by build:check in CI.
      glob:
        - 'tools/build-dist-readme.js'
      run: npm run dist-readme:check --silent
    - name: capabilities-freshness
      # Catches "added/renamed an npm script or a tools/ file, forgot to
      # regenerate engineering/capabilities.md (or describe the new
      # capability)". Sources are package.json scripts + tools/ headers, so
      # both are triggers; build:check covers it in CI too.
      glob:
        - 'package.json'
        - 'tools/**'
      run: npm run capabilities:check --silent
    - name: fonts-freshness
      # Catches "added a weight to the @import or a face to one PDF path,
      # forgot the other" — the silent font-fallback class of bug. Diffs the
      # @import demand against both offline supplies (emulator SELF_HOSTED_FACES
      # + assets/fonts/, and the web-export font-embed.js). build:check runs the
      # same gate in CI (build.js preflight). Any of the four sources is a trigger.
      glob:
        - 'lib/base/base.tokens.css'
        - 'lattice-emulator.js'
        - 'assets/fonts/**'
        - 'docs/src/playground/font-embed.js'
      run: npm run fonts:check --silent
    - name: component-docs-freshness
      # Catches the "edited a manifest, forgot to regenerate the
      # <name>.docs.md and <name>.gallery.md siblings" failure mode.
      # Compares generated output against the committed files; fails
      # if any drift. Skippable via --no-verify only as last resort.
      glob:
        - 'lib/components/**/*.manifest.json'
        - 'lib/components/index.js'
      run: npm run docs:components:check --silent
    - name: docs-portal-freshness
      # Catches the "edited a manifest, forgot to regenerate the
      # aggregated dist/docs/components.html reference portal" failure mode.
      # Same source of truth as component-docs; fails if the portal
      # drifts. Skippable via --no-verify only as last resort.
      glob:
        - 'lib/components/**/*.manifest.json'
        - 'lib/components/index.js'
        - 'tools/build-docs-portal.js'
      run: npm run docs:portal:check --silent

pre-push-disabled:
  # The per-component / bucket-gallery PDF freshness checks live here
  # rather than pre-commit because rebuilding all 58 + 18 PDFs takes
  # ~30 minutes and would block every component-CSS commit. They run
  # in CI instead. Lefthook keys this stage with `-disabled` so it
  # never fires automatically; documented here as the migration path
  # if the team wants the gate on push.

pre-push:
  # The "nothing unverified reaches the remote" boundary. Everything that
  # can be checked deterministically runs here, fail-fast cheap-first, so a
  # push is impossible until the work is green. Sequential (not parallel):
  # build:check and the integration rebuild both touch dist/ and tmp output,
  # so overlapping them risks file contention. Per-component / bucket-gallery
  # PDF freshness (58 + 18 rebuilds, ~30 min) still lives in CI only — see
  # pre-push-disabled above.
  jobs:
    - name: lint
      run: npm run lint
    - name: lint-deck
      # Repo-wide strict author-facing footgun check (pre-commit only sees
      # staged decks; this is the full sweep).
      run: npm run lint:deck:all
    - name: build-check
      # The CI build / stale-artifact gate. Deterministic (no rendering),
      # fast. Catches "edited a generator source, forgot to rebuild dist/".
      run: npm run build:check
    - name: unit-tests
      # Safety net: full unit suite runs before push regardless of what
      # pre-commit's affected-tests ran.
      run: npm test
    - name: integration-tests
      # Full integration tier (cross-renderer parity + PDF page counts) must
      # pass before push, not just in CI. Needs pdfinfo (poppler-utils) and a
      # Chromium for marp-cli; the web SessionStart hook installs both and
      # exports CHROME_PATH. The inline locate is a fallback so the gate is
      # self-contained even if the session env didn't propagate. Warm cache
      # makes repeat runs near-instant; a real source change is ~30s.
      #
      # Path guard — mirrors the `code` paths-filter in .github/workflows/ci.yml
      # exactly (keep the two in sync): the render tier can only be affected by
      # render-relevant files, so skip it when a push touches none. Fail OPEN —
      # if the merge-base or the diff can't be resolved, run it. CI re-runs the
      # full filter on the PR, so a docs/config-only push skipping here is still
      # covered before anything reaches main.
      run: |
        base="$(git merge-base HEAD origin/main 2>/dev/null || true)"
        run_it=1
        if [ -n "$base" ] && files="$(git diff --name-only "$base"...HEAD 2>/dev/null)"; then
          printf '%s\n' "$files" | grep -qE '^lib/|^tools/|^test/|^themes/|^dist/|^examples/|^marp\.config\.js$|^lattice-emulator\.js$|^mermaid-v11\.min\.js$|^package\.json$|^package-lock\.json$|^\.github/workflows/ci\.yml$' || run_it=0
        fi
        if [ "$run_it" = 1 ]; then
          export CHROME_PATH="${CHROME_PATH:-$(ls /root/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null | head -1)}"
          npm run test:integration
        else
          command -v pdfinfo >/dev/null 2>&1 || echo "  ⚠ pdfinfo missing (poppler-utils) — the integration gate that re-checks it was skipped"
          echo "integration-tests: skipped — no render-relevant changes vs origin/main (docs/config only)"
        fi

commit-msg:
  jobs:
    - name: format
      run: tools/check-commit-msg.sh {1}
