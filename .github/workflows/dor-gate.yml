name: Definition of Ready gate

# A card may carry `status:ready` only if it meets the Definition of Ready:
# a linked governing doc/spec AND a concrete acceptance check (the two ★ fields
# in the work-item form). When `status:ready` is applied, this validates the
# issue body; if either field is missing/empty it strips the label and comments,
# so `status:ready` stays a guarantee an agent can pull against.
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  validate:
    if: github.event.label.name == 'status:ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Pull the text under a `### <heading>` up to the next `###`/end.
            // Issue forms render each field as a `###` section; a skipped
            // optional field renders `_No response_`.
            function section(re) {
              const m = body.match(re);
              if (!m) return '';
              const rest = body.slice(m.index + m[0].length);
              const next = rest.search(/\n#{1,6}\s/);
              const text = (next === -1 ? rest : rest.slice(0, next)).trim();
              return /^_no response_$/i.test(text) ? '' : text;
            }

            const swimlane = section(/#{1,6}\s+.*Swimlane[^\n]*\n/i);
            const acceptance = section(/#{1,6}\s+.*Acceptance check[^\n]*\n/i);

            const missing = [];
            if (!swimlane) missing.push('a **Swimlane / governing decision doc** link');
            if (!acceptance) missing.push('a concrete **Acceptance check**');

            if (missing.length === 0) {
              core.info('Definition of Ready satisfied.');
              return;
            }

            await github.rest.issues.removeLabel({
              ...context.repo,
              issue_number: context.issue.number,
              name: 'status:ready',
            }).catch(() => {});

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                "⛔ **Not ready yet.** `status:ready` was removed because this card is missing " + missing.join(' and ') + '.',
                '',
                'The Definition of Ready (see `engineering/workflow.md` § Work queue) requires both before a card is pickable. ' +
                'Edit the issue to fill the ★ fields, then re-apply `status:ready`.',
              ].join('\n'),
            });
