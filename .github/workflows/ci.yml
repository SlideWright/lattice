name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — rapid pushes to a PR no longer
# pile up full pipelines.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change classifier ──────────────────────────────────────────────────
  # Splits a change into two independent tiers:
  #   code  — affects rendering or the test suite → unit + integration
  #   docs  — affects the docs site (Astro) → docs-build
  # An allowlist of roots, NOT "everything that isn't prose": a docs-site-only
  # change (docs/**) no longer drags the whole engine unit+integration
  # pipeline, and prose (README, design/, engineering/, *.md) runs only the
  # always-on lint. Decks count as code (they affect rendering) and live inside
  # the listed roots — examples/, plus the gallery/baseline .md under lib/ and
  # test/. An engine change (lib/, themes/, dist/, …) sets BOTH, because the
  # docs build also reads the engine (loadAll + staged dist/ + themes/).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'lib/**'
              - 'tools/**'
              - 'test/**'
              - 'themes/**'
              - 'dist/**'
              - 'examples/**'
              - 'marp.config.js'
              - 'lattice-emulator.js'
              - 'mermaid-v11.min.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'dist/**'
              - 'themes/**'
              - 'lib/**'
              - 'marp.config.js'
              - '.github/workflows/ci.yml'

  # ── Lint — ALWAYS runs (incl. docs-only) ───────────────────────────────
  # Node-agnostic and browser-free: source lint + author-facing deck lint.
  # PUPPETEER_SKIP_DOWNLOAD keeps `npm ci` from pulling ~150 MB of Chromium
  # that nothing here uses.
  lint:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Lint decks
        # Author-facing footgun checks across every deck (--strict): both
        # errors (card-style inline-title, ordered-list bold) and warnings
        # (unknown _class tokens) fail.
        run: npm run lint:deck:all

  # ── Unit + artifact-freshness — code changes only ──────────────────────
  # Matrix verifies the engines claim. Unit tests don't render, so the
  # browser download is skipped here too. build:check (regen + byte-diff of
  # every generated artifact: css, default bundle, runtime/emulator bundles,
  # component docs, portal, dist README — render-free) runs once, on 22.
  unit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    name: unit (node ${{ matrix.node-version }})
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Artifact freshness gate (build --check, no render)
        if: matrix.node-version == 22
        run: npm run build:check
      - name: Playground bundle freshness gate (byte-diff, no render)
        # The docs-site playground bundle (docs/public/playground/
        # lattice-playground.js) is generated from lib/playground + its imports
        # but lives outside dist/, so build:check doesn't cover it. Gate it here
        # so an engine/plugin change can't ship a stale bundle to the live site.
        if: matrix.node-version == 22
        run: npm run playground:check
      - name: Unit tests
        run: npm test

  # ── Integration — code changes only ────────────────────────────────────
  # The only tier that renders, so the only one that needs Chromium — cached
  # across runs (keyed on the lockfile, which moves when puppeteer bumps).
  # Runs once: the Marp/Puppeteer/emulator pipeline doesn't vary by Node.
  integration:
    needs: [changes, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    name: integration (node 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install poppler-utils (pdfinfo) + color emoji font
        # fonts-noto-color-emoji: guarantees raw unicode emoji render in COLOR
        # in the headless-Chromium PDF renders (the owned paths emit emoji as
        # plain text, not twemoji <img>). The webfont @import in lattice.css is
        # a portable bonus, but Chromium honors an installed emoji font far more
        # reliably than an @font-face one. See engineering/gotchas.md.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fonts-noto-color-emoji
      - run: npm ci
      - name: Integration tests
        run: npm run test:integration

  # ── Engine visual parity — the owned lattice-engine must pixel-match Marp ──
  # Rasterises every gallery slide through BOTH render engines and pixel-diffs
  # them (tools/engine-parity.mjs); fails on any real divergence. The one
  # intentional difference (Marp's twemoji <img> vs the engine's font-glyph
  # emoji) is skipped per slide. This is the gate that lets the owned CSS emitter
  # return safely (proposal P5): a regression vs Marp can't reach main unseen.
  engine-parity:
    needs: [changes, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    name: engine-parity (node 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install color emoji font
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji
      - run: npm ci
      - name: Engine visual parity (galleries + jargon)
        run: npm run parity -- --galleries --jargon
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: engine-parity-diffs
          path: .scratch/parity/
          if-no-files-found: ignore

  # ── Visual regression gate — fresh render must match the committed golden ──
  # engine-parity's single-renderer successor (P4): renders every gallery fresh
  # through the owned emulator and pixel-diffs it against the committed golden PDF
  # (lib/components/**/<name>.gallery.{light,dark}.pdf). GREEN = the author blessed
  # correctly; RED = unblessed drift (CSS/source changed but a deck's golden is
  # stale) — re-bless locally (`npm run bless [-- --only <name>]`) and commit the
  # refreshed PDFs. Runs ALONGSIDE engine-parity for now; engine-parity is retired
  # once this is trusted (P4 Step 3). Needs Chromium (renders), poppler (rasterize),
  # and the color emoji font — same toolchain as integration/engine-parity.
  regression:
    needs: [changes, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    name: regression (node 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install poppler-utils + ImageMagick + color emoji font
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick fonts-noto-color-emoji
      - name: Allow ImageMagick PDF coder (for the drift-montage artifact)
        # IM6's default policy.xml blocks the PDF coder, which would break the
        # `convert montages… drift.pdf` artifact built on a RED run. Relax it.
        run: sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
      - run: npm ci
      - name: Visual regression gate (render == committed golden)
        run: npm run regress
      - name: Upload drift montages on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-drift
          path: .scratch/regression/
          if-no-files-found: ignore

  # ── Golden before/after — post the intended visual change on the PR ────────
  # Informational, NON-gating (the regression gate above is the blocker). Diffs
  # THIS PR's committed goldens against the base branch, rasterizes only the slides
  # that VISUALLY changed (pixel-diff filters out PDF byte-churn from a rebuild),
  # uploads a before │ after │ overlay montage, and posts/updates a sticky PR
  # comment ("N slides changed in {galleries}"). No rendering → no Chromium; just
  # poppler + ImageMagick over the committed PDFs. See tools/golden-diff.mjs.
  golden-diff:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base-branch history to diff goldens
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install poppler-utils + ImageMagick
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick
      - name: Allow ImageMagick PDF coder (for the montage PDF)
        run: sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
      - run: npm ci
      - name: Compute golden before/after
        run: node tools/golden-diff.mjs --base ${{ github.event.pull_request.base.sha }}
      - name: Upload montage artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-diff-changes
          path: .scratch/golden-diff/changes.pdf
          if-no-files-found: ignore
      - name: Post/update before/after comment
        continue-on-error: true # a read-only token (fork PR) must not fail the run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '.scratch/golden-diff';
            const report = JSON.parse(fs.readFileSync(`${dir}/report.json`, 'utf8'));
            const marker = '<!-- golden-diff -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (!report.changed && !existing) return; // nothing to say, no prior comment
            const body = fs.readFileSync(`${dir}/summary.md`, 'utf8') + '\n' + marker;
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  # ── Docs site build — docs (or engine) changes only ────────────────────
  # The deploy workflow (docs.yml) only builds on push to main, so PRs got no
  # docs-build validation. This builds the Astro site (same `npm run build` the
  # deploy uses) so a docs/engine change that breaks the site fails the PR.
  # No rendering here, so Chromium is skipped.
  docs-build:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install docs deps
        run: npm ci
        working-directory: docs
      - name: Build docs site
        run: npm run build
        working-directory: docs

  # ── Single required check ──────────────────────────────────────────────
  # Set THIS as the only required status check in branch protection. It
  # passes when lint succeeds and the test tiers either passed or were
  # skipped (docs-only) — so conditional jobs never leave a PR stuck on a
  # "pending" required check.
  ci:
    if: always()
    needs: [lint, unit, integration, engine-parity, regression, docs-build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify gate
        run: |
          echo "lint=${{ needs.lint.result }} unit=${{ needs.unit.result }} integration=${{ needs.integration.result }} engine-parity=${{ needs.engine-parity.result }} regression=${{ needs.regression.result }} docs-build=${{ needs.docs-build.result }}"
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::lint failed"; exit 1
          fi
          for r in "${{ needs.unit.result }}" "${{ needs.integration.result }}" "${{ needs.engine-parity.result }}" "${{ needs.regression.result }}" "${{ needs.docs-build.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required tier failed ($r)"; exit 1
            fi
          done
          echo "CI gate passed."
