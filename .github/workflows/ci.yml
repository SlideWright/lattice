name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24]
    name: lint + unit (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    name: integration (node 22)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install poppler-utils (for pdfinfo)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm run test:integration
