name: CI

on:
  pull_request:
    branches: [main]
  # The merge queue runs CI on the PR tentatively rebased onto current main
  # (plus any PRs ahead of it). THIS aggregate `ci` check is the required gate
  # the queue waits on, so it must fire on merge_group. See
  # engineering/decisions/2026-06-17-workflow-efficiency-review.md §F.
  merge_group:
  # NOTE: there is deliberately NO `push: [main]` trigger. Post-merge validation
  # of main comes from the merge_group run (the queue tests the exact tree it
  # then squashes) — re-running full CI on the post-squash push would be a third
  # redundant pipeline per merge. The docs-site DEPLOY runs on push:[main] in its
  # own workflow (docs.yml), so dropping it here costs no deploy coverage. Until
  # the queue is enabled in branch protection, the PR's own run + HARD RULE #16's
  # pre-merge CI re-confirm cover the merge.

# Cancel superseded runs on the same ref — rapid pushes to a PR no longer
# pile up full pipelines.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change classifier ──────────────────────────────────────────────────
  # Splits a change into two independent tiers:
  #   code  — affects rendering or the test suite → unit + integration
  #   docs  — affects the docs site (Astro) → docs-build
  # An allowlist of roots, NOT "everything that isn't prose": a docs-site-only
  # change (docs/**) no longer drags the whole engine unit+integration
  # pipeline, and prose (README, design/, engineering/, *.md) runs only the
  # always-on lint. Decks count as code (they affect rendering) and live inside
  # the listed roots — examples/, plus the gallery/baseline .md under lib/ and
  # test/. An engine change (lib/, themes/, dist/, …) sets BOTH, because the
  # docs build also reads the engine (loadAll + staged dist/ + themes/).
  changes:
    runs-on: ubuntu-latest
    outputs:
      # On merge_group (the merge queue's combined-state run) run EVERYTHING:
      # it's the final pre-merge gate, so path-skipping is the wrong economy,
      # and paths-filter has no PR base to diff against there.
      code: ${{ steps.filter.outputs.code == 'true' || github.event_name == 'merge_group' }}
      docs: ${{ steps.filter.outputs.docs == 'true' || github.event_name == 'merge_group' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'merge_group'
        with:
          filters: |
            code:
              - 'lib/**'
              - 'tools/**'
              - 'test/**'
              - 'themes/**'
              - 'dist/**'
              - 'examples/**'
              # Worked exemplar decks ship a committed .pdf each and ride the
              # integration render gate (test/integration/exemplars/); an
              # exemplars-only change must run the integration tier so the
              # render + committed-PDF-freshness gate fires on its primary trigger.
              - 'exemplars/**'
              - 'lattice-emulator.js'
              - 'mermaid-v11.min.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'dist/**'
              - 'themes/**'
              - 'lib/**'
              # The Drawing Board's Drafting picker stages + maps the worked
              # exemplar decks; the docs vitest gates the archetype→deck mapping,
              # so an exemplars-only change must re-run the docs job.
              - 'exemplars/**'
              - '.github/workflows/ci.yml'

  # ── Lint — ALWAYS runs (incl. docs-only) ───────────────────────────────
  # Node-agnostic and browser-free: source lint + author-facing deck lint.
  # PUPPETEER_SKIP_DOWNLOAD keeps `npm ci` from pulling ~150 MB of Chromium
  # that nothing here uses.
  lint:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Lint decks
        # Author-facing footgun checks across every deck (--strict): both
        # errors (card-style inline-title, ordered-list bold) and warnings
        # (unknown _class tokens) fail.
        run: npm run lint:deck:all

  # ── Unit + artifact-freshness — code changes only ──────────────────────
  # The engines claim is `>=22`. The FULL unit suite runs on 22; on 24 a
  # representative engine smoke subset (core/engine/parsing/contracts/
  # transformers) confirms cross-version compat without paying 2× the whole
  # suite — pure-JS Node-version risk is low and concentrated in the engine
  # paths. See engineering/decisions/2026-06-17-workflow-efficiency-review.md §D.
  # build:check (regen + byte-diff of every generated artifact: css, default
  # bundle, runtime/emulator bundles, component docs, portal, dist README —
  # render-free) runs once, on 22.
  unit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    name: unit (node ${{ matrix.node-version }})
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Artifact freshness gate (build --check, no render)
        if: matrix.node-version == 22
        run: npm run build:check
      - name: Playground bundle freshness gate (byte-diff, no render)
        # The docs-site playground bundle (docs/public/playground/
        # lattice-playground.js) is generated from lib/playground + its imports
        # but lives outside dist/, so build:check doesn't cover it. Gate it here
        # so an engine/plugin change can't ship a stale bundle to the live site.
        if: matrix.node-version == 22
        run: npm run playground:check
      - name: Unit tests (full suite)
        if: matrix.node-version == 22
        run: npm test
      - name: Unit tests (engine + export smoke subset)
        if: matrix.node-version != 22
        # core/engine/parsing/contracts/transformers cover the render kernels;
        # export/ is added because PPTX/PDF export leans on Node stream/buffer/
        # zip/child-process APIs — the most Node-version-sensitive non-engine area.
        run: node --test 'test/unit/core/*.test.js' 'test/unit/engine/*.test.js' 'test/unit/parsing/*.test.js' 'test/unit/contracts/*.test.js' 'test/unit/transformers/*.test.js' 'test/unit/export/*.test.js'

  # ── Integration — code changes only ────────────────────────────────────
  # The only tier that renders, so the only one that needs Chromium — cached
  # across runs (keyed on the lockfile, which moves when puppeteer bumps).
  # Runs once: the Marp/Puppeteer/emulator pipeline doesn't vary by Node.
  # The PR-blocking slice of the render tier: shared-kernel cross-path WIRING
  # (parity/), the export pipeline (export/), and the per-component computed-style
  # correctness gate (invariants/). The heavier fresh-render REGRESSION suites
  # (galleries, components, exemplars=45 decks, mermaid-smoke, screenshot) moved
  # OFF this critical path to integration-nightly.yml — their only catch is
  # "a render drifted / a committed artifact went stale", and the latter is
  # already backstopped at pre-commit (tools/build-staged-pdfs.js + the freshness
  # gates), so a next-morning catch on `main` is cheap to revert. Same gate-strategy
  # bias as perf-nightly / preview-e2e-nightly: keep blocking gates blocking, move
  # work later only where a later catch is cheap. See
  # engineering/decisions/2026-06-27-integration-nightly-split.md.
  integration:
    needs: [changes, unit]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    name: integration (node 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install poppler-utils (pdfinfo) + color emoji font
        # fonts-noto-color-emoji: guarantees raw unicode emoji render in COLOR
        # in the headless-Chromium PDF renders (the owned paths emit emoji as
        # plain text, not twemoji <img>). The webfont @import in lattice.css is
        # a portable bonus, but Chromium honors an installed emoji font far more
        # reliably than an @font-face one. See engineering/gotchas.md.
        run: sudo apt-get update && sudo apt-get install -y poppler-utils fonts-noto-color-emoji
      - run: npm ci
      - name: Integration tests (PR slice)
        run: npm run test:integration:pr

  # ── (Engine visual parity REMOVED — marp retired, P4 Step 3) ────────────────
  # The `engine-parity` job pixel-diffed every gallery slide through the owned
  # lattice-engine AND marp, with marp as the external oracle. That gate's job
  # was to catch engine↔marp drift DURING the migration; with marp retired the
  # owned engine is canonical, so "diverges from marp" is no longer meaningful.
  # Visual correctness is now the per-component SEMANTIC-INVARIANT suite (runs in
  # the `integration` job above, marp-free). See
  # engineering/decisions/2026-06-12-p4-regression-gate-retire-marp.md §0.

  # ── (Visual regression gate REMOVED — pivoted to component invariants) ──────
  # P4 originally wired `npm run regress` (fresh render == committed golden) in as
  # the CI visual gate. That pixel gate is RETIRED: across GitHub's heterogeneous
  # runners Skia's CPU-dispatched rasterization isn't bit-identical, so it flaked
  # ~0.4–2% on a *different* gallery each run — and post-marp a self-golden pixel
  # gate detects *change*, not *correctness*. `npm run regress` survives as a
  # LOCAL spot-check only. The CI visual-correctness gate is now the per-component
  # SEMANTIC-INVARIANT suite (render via lib/engine → assert computed-style /
  # structure; deterministic + machine-independent). `golden-diff` below stays —
  # it diffs two committed PDFs on one runner, so it isn't flaky. See
  # engineering/decisions/2026-06-12-p4-regression-gate-retire-marp.md §0.

  # ── Golden before/after — post the intended visual change on the PR ────────
  # Informational, NON-gating (the integration tier's semantic-invariant suite is
  # the visual-correctness blocker). Diffs
  # THIS PR's committed goldens against the base branch, rasterizes only the slides
  # that VISUALLY changed (pixel-diff filters out PDF byte-churn from a rebuild),
  # and posts/updates a sticky PR comment ("N slides changed in {galleries}") with
  # the before │ after │ overlay montages embedded INLINE. Inline images need a
  # URL GitHub will serve, so the PNGs are hosted on the orphan `ci-drift-images`
  # branch (a pure image store, never merged) and the comment links raw URLs; the
  # full set also uploads as the `golden-diff-changes` artifact. No rendering → no
  # Chromium; just poppler + ImageMagick over the committed PDFs. See
  # tools/golden-diff.mjs.
  golden-diff:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push before/after PNGs to the orphan ci-drift-images branch
      pull-requests: write
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base-branch history to diff goldens
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install poppler-utils + ImageMagick
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick
      - name: Allow ImageMagick PDF coder (for the montage PDF)
        run: sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
      - run: npm ci
      - name: Compute golden before/after
        run: node tools/golden-diff.mjs --base ${{ github.event.pull_request.base.sha }}
      - name: Upload montage artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-diff-changes
          path: .scratch/golden-diff/changes.pdf
          if-no-files-found: ignore
      - name: Publish before/after PNGs to the image branch
        id: publish
        continue-on-error: true # non-gating: a push race must not red-X the job — the comment then falls back to table + artifact
        # Inline images in a PR comment must come from a URL GitHub will serve, so
        # the bot hosts them on the orphan `ci-drift-images` branch (a pure image
        # store, never merged) and the comment embeds raw.githubusercontent.com
        # URLs. Same-repo PRs only — a fork PR's GITHUB_TOKEN is read-only and
        # can't push; those fall back to the table + downloadable artifact.
        if: >-
          github.event.pull_request.head.repo.full_name == github.repository &&
          hashFiles('.scratch/golden-diff/montages/*.png') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BRANCH=ci-drift-images
          DEST="pr-${PR}/${SHA}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          work="$(mktemp -d)"
          if git clone --quiet --depth 1 --branch "$BRANCH" --single-branch "$REMOTE" "$work" 2>/dev/null; then
            cd "$work"
          else
            cd "$work"; git init -q; git remote add origin "$REMOTE"; git checkout -q --orphan "$BRANCH"
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf "pr-${PR}" # keep only this PR's latest commit → bound branch growth
          mkdir -p "$DEST"
          cp "$GITHUB_WORKSPACE"/.scratch/golden-diff/montages/*.png "$DEST"/
          git add -A
          git commit -q -m "ci(golden-diff): #${PR} @ ${SHA:0:7} before/after montages" \
            || echo "no image delta (tree already matches branch tip)"
          # Same-branch races across concurrent PRs touch different pr-*/ subtrees,
          # so a rejected push just needs a merge of the other PR's commit + retry.
          # `published` is set ONLY after the push actually lands — so the comment
          # never embeds a raw URL that 404s (it falls back to table + artifact).
          for i in 1 2 3; do
            if git push -q origin "$BRANCH"; then
              echo "published=true" >> "$GITHUB_OUTPUT"
              echo "pushed $DEST ($(ls "$DEST" | wc -l) imgs)"
              exit 0
            fi
            git fetch -q origin "$BRANCH" && git merge -q --no-edit --allow-unrelated-histories origin/"$BRANCH" || true
            sleep $((i * 2))
          done
          echo "push failed after retries — comment falls back to table + artifact"
          exit 1
      - name: Post/update before/after comment
        continue-on-error: true # a read-only token (fork PR) must not fail the run
        uses: actions/github-script@v7
        env:
          PUBLISHED: ${{ steps.publish.outputs.published }}
        with:
          script: |
            const fs = require('fs');
            const dir = '.scratch/golden-diff';
            const report = JSON.parse(fs.readFileSync(`${dir}/report.json`, 'utf8'));
            const marker = '<!-- golden-diff -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (!report.changed && !existing) return; // nothing to say, no prior comment

            let body = fs.readFileSync(`${dir}/summary.md`, 'utf8');

            // Embed the montages inline — only when the publish step actually pushed
            // them (same-repo PR); otherwise the table + artifact stand alone.
            const imgs = report.inlineMontages || [];
            if (process.env.PUBLISHED === 'true' && imgs.length) {
              const sha = context.payload.pull_request.head.sha;
              const baseUrl = `https://raw.githubusercontent.com/${context.payload.repository.full_name}/ci-drift-images/pr-${context.issue.number}/${sha}`;
              const blocks = imgs.map((m) =>
                `**\`${m.name}\` · ${m.mood} · slide ${m.page}** — before │ after │ overlay\n\n` +
                `![${m.name} ${m.mood} slide ${m.page}](${baseUrl}/${m.file})`
              ).join('\n\n');
              const more = report.inlineCapped
                ? `\n\n_…and ${report.montages.length - imgs.length} more changed slide(s) — see the **\`golden-diff-changes\`** artifact for the full set._`
                : '';
              const n = imgs.length, of = report.inlineCapped ? ` (of ${report.montages.length})` : '';
              body += `\n<details><summary>🖼️ before │ after │ overlay — ${n} slide${n === 1 ? '' : 's'}${of}</summary>\n\n${blocks}${more}\n\n</details>\n`;
            }

            body += '\n' + marker;
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  # ── Docs site build (+ overflow guard) — docs (or engine) changes only ──
  # The deploy workflow (docs.yml) only builds on push to main, so PRs got no
  # docs-build validation. This builds the Astro site (same `npm run build` the
  # deploy uses) so a docs/engine change that breaks the site fails the PR.
  #
  # The horizontal-overflow guard runs HERE, reusing this one build, instead of
  # in a separate workflow that rebuilt the whole Astro site a second time (the
  # old docs-overflow.yml). check-overflow.mjs serves the prebuilt docs/dist —
  # it doesn't rebuild — so it just needs a Chrome. It stays ADVISORY via
  # continue-on-error (not a merge blocker until promoted); a real overflow
  # still surfaces as a failed (red ✗) step in the job's log. See
  # engineering/decisions/2026-06-17-workflow-efficiency-review.md §D and
  # engineering/decisions/2026-06-15-docs-perf-gating-policy.md.
  docs-build:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1' # the build is render-free; overflow uses a system Chrome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      # setup-chrome has no built-in cache and pulls a full Chrome each run; its
      # Linux install dir is ~/.cache/setup-chrome, so cache that — a hit lets
      # the action reuse the binary instead of downloading. Keyed loosely (the
      # overflow check just needs *a* Chrome to measure layout widths, not a
      # pinned version); bump the suffix to force a refresh.
      - name: Cache setup-chrome download
        uses: actions/cache@v4
        with:
          path: ~/.cache/setup-chrome
          key: setup-chrome-${{ runner.os }}-stable-v1
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - name: Install docs deps
        run: npm ci
        working-directory: docs
      - name: Test docs React islands (Vitest + RTL)
        run: npm test
        working-directory: docs
      - name: Build docs site
        run: npm run build
        working-directory: docs
      # Responsive guard (advisory): no page may exceed its viewport width at
      # 390/820/1440 — a pannable page breaks on touch. Reuses the build above.
      - name: Horizontal-overflow guard (mobile/tablet/desktop)
        continue-on-error: true
        run: npm run check:overflow
        working-directory: docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}

  # ── Single required check ──────────────────────────────────────────────
  # Set THIS as the only required status check in branch protection. It
  # passes when lint succeeds and the test tiers either passed or were
  # skipped (docs-only) — so conditional jobs never leave a PR stuck on a
  # "pending" required check.
  # NOTE: `golden-diff` is intentionally ABSENT from needs/the failure loop — it
  # is advisory (see its job comment). It still runs and reports; it just doesn't
  # gate. Visual correctness gates via the semantic-invariant suite in `integration`.
  ci:
    if: always()
    needs: [lint, unit, integration, docs-build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # post the CI-green beacon comment that wakes a subscribed session
    steps:
      - name: Verify gate
        run: |
          echo "lint=${{ needs.lint.result }} unit=${{ needs.unit.result }} integration=${{ needs.integration.result }} docs-build=${{ needs.docs-build.result }}"
          # A tier result is acceptable when it's: success; skipped (a conditional
          # tier that didn't apply — e.g. docs-only skips unit/integration); or
          # cancelled. 'cancelled' here is a SUPERSEDED run — a force-push tripped
          # `concurrency: cancel-in-progress`, so a newer run on the new head SHA
          # carries the authoritative verdict. Painting the orphaned SHA red on a
          # supersession-cancel manufactured false-alarm webhooks during a merge
          # train (see engineering/decisions/2026-06-14-drift-watch-rebase-thrash.md).
          # Only a real failure/timeout stops the gate.
          for tier in "lint=${{ needs.lint.result }}" "unit=${{ needs.unit.result }}" \
                      "integration=${{ needs.integration.result }}" "docs-build=${{ needs.docs-build.result }}"; do
            case "${tier#*=}" in
              success|skipped|cancelled) ;;
              *) echo "::error::tier ${tier%%=*} did not pass (${tier#*=})"; exit 1 ;;
            esac
          done
          echo "CI gate passed."
      - name: CI-green beacon
        # Wake a subscribed Claude session the instant CI passes, so it reacts in
        # seconds instead of polling get_check_runs or waiting on the hourly check-in.
        # SUCCESS-ONLY by design: CI *failures* already arrive as webhook events, so
        # the beacon fills the one gap the integration doesn't forward — the green
        # transition. Runs only when the Verify gate above succeeded (`if: success()`)
        # and only on a real PR (merge_group has no PR to comment on).
        #
        # CREATE-not-update (delete the prior beacon, then post a fresh one) — unlike
        # the golden-diff sticky which updateComment()s in place. Only a newly CREATED
        # issue_comment is forwarded as a wake event; an in-place edit is not, so an
        # update would leave the session asleep. The delete keeps the thread to one
        # beacon. continue-on-error so a fork PR's read-only token can never red the gate.
        if: success() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-green-beacon -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `✅ **CI green** for \`${sha}\` — [run](${runUrl})\n${marker}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            for (const c of comments) {
              if (c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ ...context.repo, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });
