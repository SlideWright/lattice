name: PR auto-close linked issues

# Backstop for the partial-close footgun. GitHub's native auto-close only fires
# for issues whose number is bound to its own closing keyword, so `Closes #1, #2`
# leaves #2 open. On merge into `main` this workflow re-parses the PR body,
# collects EVERY same-repo issue number that follows a closing keyword (comma-
# and "and"-lists included), and closes any that are still open — so the linked
# work always closes regardless of how the keywords were written.
#
# Paired with pr-closing-keywords.yml (the pre-merge lint that nudges authors to
# the correct per-issue syntax in the first place). Both ignore refs inside code
# spans/blocks and cross-repo `owner/repo#N` refs, mirroring GitHub's own rules.
on:
  pull_request:
    types: [closed]

permissions:
  issues: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Strip fenced code blocks and inline code first — a body that quotes
            // the closing syntax in a sample must not close those sample issues.
            const body = (pr.body || '')
              .replace(/```[\s\S]*?```/g, ' ')
              .replace(/`[^`]*`/g, ' ');

            // Each closing keyword captures the run of refs that follows it on the
            // same line; refs may be separated by commas, whitespace, or "and", and
            // may carry a cross-repo `owner/repo#N` prefix (matched so it doesn't
            // truncate the run, but excluded from the collected local numbers).
            const KEYWORD = '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)';
            const REF = '(?:[\\w.-]+\\/[\\w.-]+)?#\\d+';
            const SEP = '(?:[ \\t]*,[ \\t]*(?:and[ \\t]+)?|[ \\t]+and[ \\t]+)';
            const segment = new RegExp(
              `\\b${KEYWORD}\\b[ \\t]*:?[ \\t]+(${REF}(?:${SEP}${REF})*)`,
              'gi',
            );
            const localNum = /(?<![\w./-])#(\d+)/g;  // bare #N only, not owner/repo#N

            const numbers = new Set();
            for (const m of body.matchAll(segment)) {
              for (const ref of m[1].matchAll(localNum)) {
                numbers.add(Number(ref[1]));
              }
            }

            if (numbers.size === 0) {
              core.info('No closing-keyword issue references in the PR body.');
              return;
            }
            core.info(`Linked issues under closing keywords: ${[...numbers].join(', ')}`);

            for (const issue_number of numbers) {
              let issue;
              try {
                ({ data: issue } = await github.rest.issues.get({ ...context.repo, issue_number }));
              } catch (e) {
                core.warning(`#${issue_number}: not found / not accessible (${e.status}); skipping.`);
                continue;
              }
              if (issue.pull_request) continue;        // it's a PR, not an issue
              if (issue.state === 'closed') {
                core.info(`#${issue_number}: already closed; skipping.`);
                continue;
              }

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body: `Closed by #${pr.number} (merged into \`${pr.base.ref}\`).`,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`#${issue_number}: closed.`);
            }
