name: Docs overflow guard

# Per-PR responsive guard for the docs site: no page may exceed its viewport
# width at mobile/tablet/desktop (a pannable page breaks on touch zoom/scroll/
# tap). This is DETERMINISTIC (layout width is a property of the code, not the
# runner) and fast, so it stays a per-PR check — unlike the WEB-PERF budget,
# which is runner-coupled + noisy and moved to a NIGHTLY relative-regression
# watch (.github/workflows/perf-nightly.yml). See
# engineering/decisions/2026-06-15-docs-perf-gating-policy.md.
#
# Advisory by default (NOT in the required `ci` aggregate). Promote via branch
# protection once it has settled.

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'lib/**'
      - 'dist/**'
      - 'themes/**'
      - '.github/workflows/docs-overflow.yml'

# Don't pile up runs on a busy PR.
concurrency:
  group: docs-overflow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  overflow:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable
      - name: Install docs deps
        run: npm ci
        working-directory: docs
      # `npm run build` (not bare `astro build`) so check:overflow gets the full
      # committed dist incl. synced portal/playground assets; showcase:check is a
      # fast presence-only gate (rasterize-showcase --check), not the slow render.
      - name: Build docs site
        run: npm run build
        working-directory: docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
      # Responsive guard: no page may exceed its viewport width (a pannable page
      # breaks on touch zoom/scroll/tap). Exercises the interaction states (pane
      # switches, overlay opens) too.
      - name: Horizontal-overflow guard (mobile/tablet/desktop)
        run: npm run check:overflow
        working-directory: docs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
