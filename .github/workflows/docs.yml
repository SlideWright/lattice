name: Deploy docs site

on:
  push:
    branches: [main]
    # The playground stages engine assets at build time (sync-playground-assets:
    # dist/lattice.css, dist/lattice-runtime.js, themes/*.css) and bundles
    # lib/playground + its imports (lib/integrations, lib/transformers). A change
    # to any of those alters what the live playground renders WITHOUT touching
    # docs/, so they must trigger a redeploy too — otherwise an engine/theme PR
    # silently leaves the live playground on the previously-deployed assets.
    paths:
      - 'docs/**'
      - 'dist/**'
      - 'themes/**'
      - 'lib/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          path: docs
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
