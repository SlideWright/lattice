name: PR closing-keyword lint

# Guard against the partial-close footgun: GitHub only auto-closes an issue when
# a closing keyword is bound to EACH issue number. A list after a single keyword
# — `Closes #1, #2, #3` or `Closes #1 and #2` — closes ONLY #1 and silently
# leaves the rest open. This check fails the PR when it spots that shape and
# tells the author to rewrite it as `Closes #1, closes #2, closes #3` (one
# keyword per issue).
#
# Paired with pr-autoclose-issues.yml, which closes the whole list on merge even
# if this lint is bypassed (edited-after-checks, admin merge). The two agree on
# the semantics: `Closes #A, #B` means "close both". Both ignore refs inside
# code spans/blocks and only consider same-repo `#N` refs, mirroring GitHub.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  lint-closing-keywords:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Strip fenced code blocks and inline code — GitHub doesn't honour
            // closing keywords there, and our own help text quotes the syntax.
            const body = (context.payload.pull_request.body || '')
              .replace(/```[\s\S]*?```/g, ' ')
              .replace(/`[^`]*`/g, ' ');

            // The footgun is a single closing keyword followed (same line) by a run
            // of 2+ issue refs separated by "," / "and" — only the first closes.
            // Correct syntax ("Closes #1, closes #2") binds a keyword to each, so
            // each run holds exactly one ref. Mirrors pr-autoclose-issues.yml.
            const KEYWORD = '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)';
            const REF = '(?:[\\w.-]+\\/[\\w.-]+)?#\\d+';
            const SEP = '(?:[ \\t]*,[ \\t]*(?:and[ \\t]+)?|[ \\t]+and[ \\t]+)';
            const segment = new RegExp(
              `\\b${KEYWORD}\\b[ \\t]*:?[ \\t]+(${REF}(?:${SEP}${REF})*)`,
              'gi',
            );
            const refTok = /(?:[\w.-]+\/[\w.-]+)?#\d+/g;

            const footgun = [...body.matchAll(segment)].some(
              (m) => (m[1].match(refTok) || []).length >= 2,
            );
            if (!footgun) {
              core.info('Closing-keyword syntax OK (no multi-ref run after a keyword).');
              return;
            }

            const msg = [
              '⛔ **Partial-close footgun in the PR description.**',
              '',
              'A list after a single closing keyword — e.g. `Closes #1, #2, #3` or ' +
              '`Closes #1 and #2` — closes **only #1** on merge. GitHub needs a closing ' +
              'keyword bound to *each* issue number.',
              '',
              'Rewrite it with one keyword per issue:',
              '',
              '```',
              'Closes #1, closes #2, closes #3',
              '```',
              '',
              'or one per line:',
              '',
              '```',
              'Closes #1',
              'Closes #2',
              'Closes #3',
              '```',
              '',
              '_(The `pr-autoclose-issues` workflow will still close the whole list on merge ' +
              'as a backstop — but fix the description so the linked-issue UI is correct too.)_',
            ].join('\n');

            // Post the explanation once (refresh it if already present). Best-effort:
            // a read-only token (e.g. a fork PR) can't comment, but the check must
            // still fail, so swallow comment errors and fall through to setFailed.
            try {
              const marker = '<!-- closing-keyword-lint -->';
              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find((c) => (c.body || '').includes(marker));
              const fullBody = `${marker}\n${msg}`;
              if (existing) {
                await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body: fullBody });
              } else {
                await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: fullBody });
              }
            } catch (e) {
              core.warning(`Could not post the explanation comment (${e.status || e.message}); failing the check anyway.`);
            }

            core.setFailed('PR description has a bare list after a closing keyword; only the first issue would close.');
